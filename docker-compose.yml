services:
  postgres:
    image: postgres:15
    container_name: chainhub-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: chainhub_dev
      POSTGRES_USER: chainhub
      POSTGRES_PASSWORD: chainhub
    volumes:
      - chainhub_pgdata:/var/lib/postgresql/data

  postgres-e2e:
    image: postgres:15
    container_name: chainhub-postgres-e2e
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: chainhub_e2e
      POSTGRES_USER: chainhub
      POSTGRES_PASSWORD: chainhub
    volumes:
      - chainhub_e2e_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chainhub -d chainhub_e2e']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  chainhub_pgdata:
  chainhub_e2e_data:
