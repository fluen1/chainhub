name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: # tillader manuel kørsel (bl.a. E2E-jobbet, der er parkeret)

env:
  NODE_VERSION: '24'

jobs:
  lint-test:
    name: Lint + tsc + Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests (Vitest + coverage)
        run: npm run test:coverage
        env:
          # Tests med runIf(!!DATABASE_URL) springes over uden DB.
          # Mock-baserede tests (finance, governance, persons, audit) kører.
          NODE_ENV: test

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          # Build kræver ikke DSN — Sentry init er gated by enabled flag
          NEXTAUTH_SECRET: dummy-build-secret-only-32-chars-min
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy?schema=public
          DIRECT_URL: postgresql://dummy:dummy@localhost:5432/dummy?schema=public

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # PARKERET: kører KUN ved manuel workflow_dispatch, ikke på push/PR.
    # Infrastrukturen er repareret (container m. forudinstallerede browsere — install-
    # hanget er væk), men suiten har aldrig kørt grønt: webServeren ser
    # "table User does not exist" trods db:e2e:reset (schema-reset/webServer-DB-
    # mismatch der kræver dedikeret debugging). continue-on-error hjalp ikke, fordi
    # job-timeout = cancelled (ikke failure) → markerede hele runnet cancelled.
    # Når DB-wiringen er fikset: skift if til at køre på push/PR + genindsæt i deploy.needs.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    # Officielt Playwright-image med browsere FORUDINSTALLERET (matcher playwright 1.59.1).
    # Eliminerer `playwright install`-steppet, som hang ~29 min på extraction efter
    # download (runner/Playwright-bug) og ramte timeout i 3 kørsler.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: chainhub
          POSTGRES_PASSWORD: chainhub
          POSTGRES_DB: chainhub_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # I container-jobs nås service-containeren via service-navnet (postgres), ikke localhost.
      - name: Reset E2E database
        run: |
          set -x
          npx prisma db push --skip-generate --force-reset
          npx prisma db seed
        env:
          E2E_DATABASE_URL: postgresql://chainhub:chainhub@postgres:5432/chainhub_e2e
          DATABASE_URL: postgresql://chainhub:chainhub@postgres:5432/chainhub_e2e
          DIRECT_URL: postgresql://chainhub:chainhub@postgres:5432/chainhub_e2e

      # DIAG (midlertidig): bevis om reset rent faktisk skabte tabeller i den DB
      # webServeren læser fra. Connecter med app'ens egen PrismaClient.
      - name: DIAG verify schema after reset
        run: |
          echo "DIAG node $(node -v)"
          node -e "const {PrismaClient}=require('@prisma/client');const p=new PrismaClient();(async()=>{try{const t=await p.\$queryRawUnsafe(\"SELECT table_name FROM information_schema.tables WHERE table_schema='public' ORDER BY 1\");console.log('DIAG_TABLES='+t.map(r=>r.table_name).join(','));const c=await p.user.count();console.log('DIAG_USER_COUNT='+c);}catch(e){console.log('DIAG_ERR='+e.message.split(String.fromCharCode(10))[0]);}await p.\$disconnect();})()"
        env:
          E2E_DATABASE_URL: postgresql://chainhub:chainhub@postgres:5432/chainhub_e2e
          DATABASE_URL: postgresql://chainhub:chainhub@postgres:5432/chainhub_e2e
          DIRECT_URL: postgresql://chainhub:chainhub@postgres:5432/chainhub_e2e

      - name: Run E2E tests
        run: npx playwright test --max-failures=1
        env:
          E2E_DATABASE_URL: postgresql://chainhub:chainhub@postgres:5432/chainhub_e2e
          DATABASE_URL: postgresql://chainhub:chainhub@postgres:5432/chainhub_e2e
          DIRECT_URL: postgresql://chainhub:chainhub@postgres:5432/chainhub_e2e
          E2E_PORT: 3010
          NEXTAUTH_SECRET: e2e-test-secret-min-32-chars-long-x
          NEXTAUTH_URL: http://localhost:3010
          CI: 'true'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Deploy håndteres af Vercels egen Git-integration (auto-deploy på master-push),
  # ikke af GitHub Actions. Tidligere Vercel-CLI-deploy-job fjernet for at undgå
  # dobbelt-deploy. Vercel-projektet kræver prisma generate ved install (postinstall).
