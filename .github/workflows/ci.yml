name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  lint-typecheck-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: chainhub
          POSTGRES_PASSWORD: chainhub_test
          POSTGRES_DB: chainhub_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: "postgresql://chainhub:chainhub_test@localhost:5432/chainhub_test"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "ci-test-secret-minimum-32-characters-long!!"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      MICROSOFT_CLIENT_ID: "ci-mock-client-id"
      MICROSOFT_CLIENT_SECRET: "ci-mock-client-secret"
      MICROSOFT_TENANT_ID: "ci-mock-tenant-id"
      STRIPE_SECRET_KEY: "sk_test_mock"
      STRIPE_WEBHOOK_SECRET: "whsec_mock_webhook_secret_for_ci_testing"
      CRON_SECRET: "ci-mock-cron-secret-for-testing-only"
      # Sentry deaktiveret i CI (source maps kræver release-build)
      SENTRY_DSN: ""
      NEXT_PUBLIC_SENTRY_DSN: ""
      # Rate limiting deaktiveret i CI
      UPSTASH_REDIS_REST_URL: ""
      UPSTASH_REDIS_REST_TOKEN: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations (test DB)
        run: npx prisma migrate deploy

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript typecheck
        run: npm run typecheck

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Validate environment variables schema
        run: npm run validate-env -- --ci
        env:
          CI: true

      - name: Run unit tests with coverage
        run: npm run test -- --reporter=verbose --coverage
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            test-results/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: "postgresql://build:build@localhost:5432/build"
          NEXTAUTH_URL: "http://localhost:3000"
          NEXTAUTH_SECRET: "build-secret-minimum-32-characters-long!!!"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          MICROSOFT_CLIENT_ID: "build-mock-client-id"
          MICROSOFT_CLIENT_SECRET: "build-mock-client-secret"
          MICROSOFT_TENANT_ID: "build-mock-tenant-id"
          CRON_SECRET: "build-mock-cron-secret"
          # Sentry source maps uploades kun ved release-builds (ikke PR builds)
          SENTRY_DSN: ""
          NEXT_PUBLIC_SENTRY_DSN: ""
          SENTRY_AUTH_TOKEN: ""

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 1

  security-check:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint-typecheck-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high + critical)
        run: npm audit --audit-level=high
        # continue-on-error tillader CI at rapportere men ikke blokere
        # Skift til false når alle audit-issues er løst
        continue-on-error: true

      - name: Check for secrets in code (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

      - name: Check .env.example har ingen rigtige secrets
        run: |
          # Fejl hvis .env.example indeholder noget der ligner en rigtig Stripe key
          if grep -E "sk_live_[a-zA-Z0-9]+" .env.example; then
            echo "❌ FEJL: .env.example indeholder hvad der ligner en rigtig Stripe secret key!"
            exit 1
          fi
          # Tjek for rigtige Sentry DSN patterns
          if grep -E "https://[a-f0-9]+@o[0-9]+\.ingest\.sentry\.io/[0-9]+" .env.example; then
            echo "❌ FEJL: .env.example indeholder hvad der ligner en rigtig Sentry DSN!"
            exit 1
          fi
          echo "✅ .env.example ser ren ud for produktions-secrets"