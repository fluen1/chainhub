<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selskaber — ChainHub</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: #fafafa;
        color: #1f2328;
        font-size: 13px;
        -webkit-font-smoothing: antialiased;
      }
      .layout {
        display: grid;
        grid-template-columns: 220px 1fr;
        min-height: 100vh;
      }

      /* ── SIDEBAR ── */
      .sb {
        background: #f6f7f9;
        border-right: 1px solid #e1e4e8;
        padding: 14px 8px;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
      }
      .sb-logo {
        font-weight: 600;
        padding: 4px 10px 16px;
      }
      .sb-sec {
        margin-bottom: 16px;
      }
      .sb-lab {
        font-size: 10px;
        color: #6e7681;
        padding: 0 10px 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 600;
      }
      .sb-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
      }
      .sb-item.active {
        background: #e8eaee;
        font-weight: 500;
      }
      .sb-item:hover:not(.active) {
        background: #ecedf0;
      }
      .sb-cnt {
        font-size: 11px;
        color: #6e7681;
        font-variant-numeric: tabular-nums;
      }
      .sb-cnt.a {
        color: #b91c1c;
        font-weight: 600;
      }
      .sb-cnt.w {
        color: #b54708;
      }

      /* ── MAIN ── */
      .main {
        padding: 12px 24px 24px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-width: 0;
      }

      /* ── DEMO BAR ── */
      .demo-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 10px;
        background: #f6f7f9;
        border: 1px solid #e1e4e8;
        border-radius: 4px;
        font-size: 11px;
        color: #6e7681;
      }
      .demo-bar span {
        font-weight: 600;
        color: #8c959f;
      }
      .demo-btn {
        font-size: 11px;
        padding: 2px 8px;
        border: 1px solid #d0d7de;
        border-radius: 3px;
        background: white;
        color: #6e7681;
        cursor: pointer;
        font-family: inherit;
      }
      .demo-btn.on {
        background: #e8eaee;
        color: #1f2328;
        border-color: #c1c5cc;
        font-weight: 500;
      }
      .demo-btn:hover:not(.on) {
        background: #f6f8fa;
      }

      /* ── HEADER ── */
      .crumb {
        font-size: 12px;
        color: #6e7681;
        padding: 4px 0 2px;
      }
      .head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 10px;
        border-bottom: 1px solid #e1e4e8;
      }
      .head h1 {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin-bottom: 3px;
      }
      .head-meta {
        font-size: 12px;
        color: #6e7681;
        font-variant-numeric: tabular-nums;
      }
      .hl-r {
        color: #b91c1c;
        font-weight: 500;
      }
      .hl-a {
        color: #b54708;
        font-weight: 500;
      }
      .sep-dot {
        margin: 0 8px;
        color: #d0d7de;
      }
      .btn {
        font-size: 12px;
        padding: 5px 10px;
        border: 1px solid #d0d7de;
        background: white;
        color: #1f2328;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 500;
        font-family: inherit;
        white-space: nowrap;
      }
      .btn:hover {
        background: #f6f8fa;
      }
      .btn.primary {
        background: #0969da;
        color: white;
        border-color: #0969da;
      }
      .btn.primary:hover {
        background: #0860c7;
      }

      /* ── ALERT ── */
      .alert-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 14px;
        background: #ffebe9;
        border: 1px solid #ffc1ba;
        border-left: 3px solid #cf222e;
        border-radius: 4px;
        font-size: 13px;
        color: #6e1010;
      }

      /* ── STRIP ── */
      .strip {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 1px;
        background: #e1e4e8;
        border: 1px solid #e1e4e8;
        border-radius: 4px;
        overflow: hidden;
      }
      .sc {
        background: white;
        padding: 8px 12px;
      }
      .sn {
        font-size: 16px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        line-height: 1.1;
        color: #1f2328;
      }
      .sn.a {
        color: #b91c1c;
      }
      .sn.w {
        color: #b54708;
      }
      .sn.g {
        color: #1a7f37;
      }
      .sl {
        font-size: 10px;
        color: #6e7681;
        margin-top: 3px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }

      /* ── TWO-COL: main table + right rail ── */
      .page-cols {
        display: grid;
        grid-template-columns: 1fr 200px;
        gap: 12px;
        align-items: start;
      }

      /* ── FILTER ROW ── */
      .filter-row {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: nowrap;
      }
      .fi-search {
        font-size: 12px;
        padding: 5px 10px;
        border: 1px solid #d0d7de;
        border-radius: 4px;
        background: white;
        font-family: inherit;
        width: 185px;
        outline: none;
        color: #1f2328;
      }
      .fi-search:focus {
        border-color: #0969da;
        outline: 2px solid #ddf4ff;
        outline-offset: 0;
      }
      .fi-search::placeholder {
        color: #8c959f;
      }
      .filter-sep {
        width: 1px;
        height: 20px;
        background: #e1e4e8;
        margin: 0 2px;
        flex-shrink: 0;
      }
      .f-btn {
        font-size: 12px;
        padding: 5px 10px;
        border: 1px solid #d0d7de;
        background: white;
        color: #6e7681;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
      }
      .f-btn:hover {
        background: #f6f8fa;
        color: #1f2328;
      }
      .f-btn.on {
        background: #ddf4ff;
        border-color: #0969da;
        color: #0969da;
      }
      .f-btn.clr {
        color: #cf222e;
        border-color: #ffc1ba;
      }
      .f-btn.clr:hover {
        background: #ffebe9;
      }
      .filter-spacer {
        flex: 1;
      }
      .seg {
        display: inline-flex;
        border: 1px solid #d0d7de;
        border-radius: 4px;
        overflow: hidden;
        flex-shrink: 0;
      }
      .sopt {
        padding: 5px 10px;
        font-size: 12px;
        color: #6e7681;
        background: white;
        border-right: 1px solid #d0d7de;
        cursor: pointer;
        font-family: inherit;
      }
      .sopt:last-child {
        border-right: none;
      }
      .sopt.on {
        background: #1f2328;
        color: white;
      }
      .sopt:hover:not(.on) {
        background: #f6f8fa;
      }

      /* ── DROPDOWN ── */
      .dd-wrap {
        position: relative;
      }
      .dd-menu {
        position: absolute;
        top: calc(100% + 3px);
        left: 0;
        min-width: 150px;
        background: white;
        border: 1px solid #d0d7de;
        border-radius: 4px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.11);
        z-index: 200;
        overflow: hidden;
      }
      .dd-item {
        padding: 6px 12px;
        font-size: 12px;
        color: #1f2328;
        cursor: pointer;
        white-space: nowrap;
      }
      .dd-item:hover {
        background: #f6f7f9;
      }
      .dd-item.on {
        background: #ddf4ff;
        color: #0969da;
        font-weight: 500;
      }

      /* ── BADGES ── */
      .badge {
        font-size: 11px;
        font-weight: 500;
        padding: 1px 6px;
        border-radius: 3px;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
        display: inline-block;
      }
      .badge.red {
        background: #ffebe9;
        color: #cf222e;
      }
      .badge.amber {
        background: #fff8c5;
        color: #9a6700;
      }
      .badge.green {
        background: #dafbe1;
        color: #1a7f37;
      }
      .badge.blue {
        background: #ddf4ff;
        color: #0969da;
      }
      .badge.gray {
        background: #f6f8fa;
        color: #57606a;
      }

      /* ── HEALTH DOT ── */
      .h-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
        display: inline-block;
      }

      /* ── TABLE ── */
      .tbl-wrap {
        background: white;
        border: 1px solid #e1e4e8;
        border-radius: 4px;
        overflow: hidden;
      }
      .tbl {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }
      .col-naam {
        width: auto;
      }
      .col-cvr {
        width: 80px;
      }
      .col-type {
        width: 100px;
      }
      .col-ejer {
        width: 62px;
      }
      .col-kontr {
        width: 80px;
      }
      .col-sager {
        width: 68px;
      }
      .col-ebit {
        width: 84px;
      }
      .col-hlth {
        width: 72px;
      }
      .col-act {
        width: 20px;
      }
      .tbl th {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #6e7681;
        padding: 6px 12px;
        background: #fbfbfc;
        border-bottom: 1px solid #e1e4e8;
        text-align: left;
        cursor: pointer;
        user-select: none;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tbl th:hover {
        color: #1f2328;
      }
      .tbl th.sorted {
        color: #1f2328;
      }
      .tbl td {
        font-size: 13px;
        padding: 6px 12px;
        border-bottom: 1px solid #f0f1f3;
        color: #1f2328;
        vertical-align: middle;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .tbl tr:last-child td {
        border-bottom: none;
      }
      .tbl tr:hover td {
        background: #f6f7f9;
        cursor: pointer;
      }
      .td-sec {
        color: #6e7681;
        font-size: 12px;
      }
      .td-r {
        text-align: right;
      }
      .chev {
        color: #8c959f;
      }

      /* ── CARD GRID ── */
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 8px;
      }
      .co-card {
        background: white;
        border: 1px solid #e1e4e8;
        border-radius: 4px;
        padding: 10px 12px;
        cursor: pointer;
      }
      .co-card:hover {
        border-color: #0969da;
        background: #f8fbff;
      }
      .cc-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 6px;
      }
      .cc-name {
        font-size: 13px;
        font-weight: 500;
        color: #1f2328;
        line-height: 1.3;
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .cc-meta {
        font-size: 11px;
        color: #6e7681;
        margin-bottom: 6px;
      }
      .cc-stats {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      /* ── RIGHT RAIL ── */
      .rail {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .pnl {
        background: white;
        border: 1px solid #e1e4e8;
        border-radius: 4px;
        overflow: hidden;
      }
      .pnl-h {
        padding: 6px 12px;
        border-bottom: 1px solid #e1e4e8;
        background: #fbfbfc;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .pnl-t {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #1f2328;
      }
      .pnl-m {
        font-size: 11px;
        color: #6e7681;
      }
      .rail-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px 12px;
        border-bottom: 1px solid #f0f1f3;
        font-size: 12px;
        cursor: pointer;
      }
      .rail-row:hover {
        background: #f6f7f9;
      }
      .rail-row:last-child {
        border-bottom: none;
      }
      .rr-name {
        color: #1f2328;
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .rr-val {
        font-size: 11px;
        flex-shrink: 0;
        margin-left: 6px;
      }

      /* ── HEATMAP (mini, right rail) ── */
      .hm-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 2px;
        padding: 10px 12px 8px;
      }
      .hm-cell {
        aspect-ratio: 1;
        border-radius: 2px;
        cursor: pointer;
      }
      .hm-cell:hover {
        transform: scale(1.2);
      }
      .hm-cell.g4 {
        background: #196127;
      }
      .hm-cell.g3 {
        background: #239a3b;
      }
      .hm-cell.g2 {
        background: #7bc96f;
      }
      .hm-cell.g1 {
        background: #c6e48b;
      }
      .hm-cell.r3 {
        background: #b91c1c;
      }
      .hm-cell.r2 {
        background: #f87171;
      }
      .hm-cell.r1 {
        background: #fdb8b1;
      }
      .hm-cell.n {
        background: #ebedf0;
      }
      .hm-leg {
        padding: 0 12px 10px;
        font-size: 10px;
        color: #6e7681;
        display: flex;
        justify-content: space-between;
      }

      /* ── GROUPED ── */
      .grp-hdr {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        background: #f6f7f9;
        border-bottom: 1px solid #e1e4e8;
        cursor: pointer;
        user-select: none;
      }
      .grp-hdr:hover {
        background: #ecedf0;
      }
      .gh-tog {
        font-size: 10px;
        color: #6e7681;
        width: 12px;
        flex-shrink: 0;
      }
      .gh-name {
        font-size: 12px;
        font-weight: 600;
        color: #1f2328;
        flex: 1;
      }
      .gh-cnt {
        font-size: 10px;
        font-weight: 600;
        padding: 1px 7px;
        border-radius: 10px;
        background: #e1e4e8;
        color: #57606a;
        font-variant-numeric: tabular-nums;
      }
      .gh-cnt.a {
        background: #ffebe9;
        color: #cf222e;
      }

      /* ── SKELETON ── */
      .skel {
        background: linear-gradient(90deg, #f0f1f3 25%, #f6f7f9 50%, #f0f1f3 75%);
        background-size: 200% 100%;
        animation: shimmer 1.6s infinite;
        border-radius: 3px;
        display: inline-block;
      }
      @keyframes shimmer {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }

      /* ── PAGER ── */
      .pager {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        background: white;
        border: 1px solid #e1e4e8;
        border-radius: 4px;
      }
      .pager-info {
        font-size: 12px;
        color: #6e7681;
        font-variant-numeric: tabular-nums;
      }
      .pg-btn {
        font-size: 11px;
        padding: 3px 8px;
        border: 1px solid #d0d7de;
        background: white;
        color: #1f2328;
        border-radius: 3px;
        cursor: pointer;
        font-family: inherit;
      }
      .pg-btn:hover:not(:disabled) {
        background: #f6f8fa;
      }
      .pg-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .psz-btn {
        font-size: 11px;
        padding: 2px 7px;
        border: 1px solid #d0d7de;
        background: white;
        color: #6e7681;
        border-radius: 3px;
        cursor: pointer;
        font-family: inherit;
      }
      .psz-btn.on {
        background: #e8eaee;
        color: #1f2328;
        border-color: #c1c5cc;
        font-weight: 500;
      }

      /* ── EMPTY ── */
      .empty {
        padding: 32px;
        text-align: center;
        color: #8c959f;
        font-size: 12px;
      }
      .empty strong {
        display: block;
        color: #6e7681;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 6px;
      }

      /* ── BOTTOM BAR ── */
      .bot-bar {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        font-size: 11px;
        color: #6e7681;
      }
      .kbd {
        background: #f6f8fa;
        border: 1px solid #d0d7de;
        border-radius: 3px;
        padding: 1px 5px;
        font-family: 'SF Mono', 'Fira Mono', monospace;
        font-size: 10px;
        color: #1f2328;
      }

      /* ── TOAST ── */
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: #1f2328;
        color: white;
        padding: 9px 16px;
        border-radius: 4px;
        font-size: 13px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.22);
        z-index: 9000;
        white-space: nowrap;
        animation: tin 0.15s ease;
      }
      @keyframes tin {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }
    </style>
  </head>

      function Dd({ label, opts, value, onChange }) {
        const [open, setOpen] = useState(false)
        const ref = useRef(null)
        useEffect(() => {
          function h(e) {
            if (!ref.current?.contains(e.target)) setOpen(false)
          }
          document.addEventListener('mousedown', h)
          return () => document.removeEventListener('mousedown', h)
        }, [])
        return (
          <div className="dd-wrap" ref={ref}>
            <button
              className={`f-btn${value && value !== 'Alle' ? ' on' : ''}`}
              onClick={() => setOpen((o) => !o)}

            {open && (
              <div className="dd-menu">
                {opts.map((o) => (
                  <div

                    className={`dd-item${value === o ? ' on' : ''}`}
                    onClick={() => {

                      setOpen(false)

                  </div>
                ))}
              </div>
            )}
          </div>
        )

        const isSkeleton = demo === 'skeleton'

        function doToast(msg) {
          setToast(msg)
          setToastKey((k) => k + 1)
          setTimeout(() => setToast(null), 2600)
        }

        function handleSort(col) {
          if (sortCol === col) setSortDir((d) => (d === 'asc' ? 'desc' : 'asc'))
          else {
            setSortCol(col)
            setSortDir('asc')
          }
        }

        const filtered = COMPANIES.filter((c) => {
          const q = search.toLowerCase()
          if (
            q &&
            !c.navn.toLowerCase().includes(q) &&
            !c.cvr.includes(q) &&
            !c.region.toLowerCase().includes(q)
          )
            return false
          if (typeFil !== 'Alle' && c.type !== typeFil) return false
          if (regionFil !== 'Alle') {
            const map = {
              København: 'Kbh',
              Nordjylland: 'Nord',
              Midtjylland: 'Midt',
              'Syd- og Sønderjylland': 'Syd',
            }
            if (c.region !== map[regionFil]) return false
          }
          if (ejerFil === '100% ejet' && c.ejer !== 100) return false
          if (ejerFil === 'Co-ejet (>50%)' && c.ejer >= 100) return false
          if (ejerFil === 'Co-ejet (51%)' && c.ejer !== 51) return false
          if (urgOnly && !c.salerAlarm && !c.health.startsWith('r') && c.kontrUdlob === 0)
            return false
          return true
        })

        const sorted = [...filtered].sort((a, b) => {
          const av = a[sortCol] ?? 0,
            bv = b[sortCol] ?? 0
          if (av < bv) return sortDir === 'asc' ? -1 : 1
          if (av > bv) return sortDir === 'asc' ? 1 : -1
          return 0
        })

        const paged = sorted.slice((page - 1) * pageSize, page * pageSize)
        const maxPage = Math.max(1, Math.ceil(sorted.length / pageSize))
        const hasFilter =
          typeFil !== 'Alle' || regionFil !== 'Alle' || ejerFil !== 'Alle' || search || urgOnly

        const critCount = COMPANIES.filter((c) => c.health === 'r3' || c.health === 'r2').length
        const ejendomPct = Math.round(
          (COMPANIES.filter((c) => c.ejer === 100).length / COMPANIES.length) * 100
        )
        const totalEbit = '42,8m'

        const Th = ({ col, label, cls }) => (
          <th
            className={`${cls || ''} ${sortCol === col ? 'sorted' : ''}`}
            onClick={() => handleSort(col)}
          >
            {label}
            {sortCol === col ? (sortDir === 'asc' ? ' ↑' : ' ↓') : ''}
          </th>
        )

        return (

            <Sidebar />
            <main className="main">
              <div className="demo-bar">
                <span>Demo:</span>
                {['normal', 'skeleton', 'fejl'].map((s) => (

                  </button>

                    Prøv igen
                  </button>
                </div>
              )}

                    32 i porteføljen
                    <span className="sep-dot">·</span>
                    <span className="hl-r">{critCount} kræver opmærksomhed</span>

                </div>
                <div style={{ display: 'flex', gap: 6 }}>
                  <button className="btn primary" onClick={() => doToast('Opret selskab')}>
                    + Opret selskab
                  </button>
                </div>
              </div>

              {!isSkeleton && (
                <div className="strip">
                  <div className="sc">
                    <div className="sn">32</div>
                    <div className="sl">I porteføljen</div>
                  </div>
                  <div className="sc">
                    <div className="sn">21</div>
                    <div className="sl">Co-ejet</div>
                  </div>
                  <div className="sc">
                    <div className="sn">11</div>
                    <div className="sl">100% ejet</div>
                  </div>
                  <div className="sc">
                    <div className="sn a">{critCount}</div>
                    <div className="sl">Kræver opmærks.</div>
                  </div>
                  <div className="sc">
                    <div className="sn">184</div>
                    <div className="sl">Pers. i alt</div>
                  </div>
                  <div className="sc">
                    <div className="sn g">{totalEbit}</div>
                    <div className="sl">EBITDA YTD</div>
                  </div>
                </div>
              )}

              {!isSkeleton && (
                <div className="filter-row">
                  <input
                    className="fi-search"
                    placeholder="Søg selskaber..."
                    value={search}
                    onChange={(e) => {
                      setSearch(e.target.value)
                      setPage(1)
                    }}
                  />
                  <Dd
                    label="Type"
                    opts={['Alle', ...UNIQUE_TYPE]}
                    value={typeFil}
                    onChange={(v) => {
                      setTypeFil(v)
                      setPage(1)
                    }}
                  />
                  <Dd
                    label="Region"
                    opts={[
                      'Alle',
                      'København',
                      'Nordjylland',
                      'Midtjylland',
                      'Syd- og Sønderjylland',
                    ]}
                    value={regionFil}
                    onChange={(v) => {
                      setRegionFil(v)
                      setPage(1)
                    }}
                  />
                  <Dd
                    label="Ejerskab"
                    opts={EJER_OPTS}
                    value={ejerFil}
                    onChange={(v) => {
                      setEjerFil(v)
                      setPage(1)
                    }}
                  />
                  <button
                    className={`f-btn${urgOnly ? ' on' : ''}`}
                    onClick={() => {
                      setUrgOnly((v) => !v)
                      setPage(1)
                    }}
                  >
                    {urgOnly ? '⚠ Kritiske ×' : '⚠ Kritiske'}
                  </button>
                  {hasFilter && (
                    <button
                      className="f-btn clr"
                      onClick={() => {
                        setSearch('')
                        setTypeFil('Alle')
                        setRegionFil('Alle')
                        setEjerFil('Alle')
                        setUrgOnly(false)
                      }}
                    >
                      Nulstil ×
                    </button>
                  )}
                  <div className="filter-sep"></div>
                  <div className="seg">
                    {[
                      ['tabel', 'Tabel'],
                      ['grupperet', 'Regioner'],
                      ['kort', 'Kort'],
                    ].map(([v, l]) => (
                      <button
                        key={v}
                        className={`sopt${viewMode === v ? ' on' : ''}`}
                        onClick={() => setViewMode(v)}
                      >
                        {l}
                      </button>
                    ))}
                  </div>
                  <div className="filter-spacer"></div>
                  <button className="f-btn">Eksportér ▾</button>
                </div>
              )}

              {hasFilter && !isSkeleton && (
                <div style={{ fontSize: 11, color: '#6e7681' }}>
                  {sorted.length} resultat{sorted.length !== 1 ? 'er' : ''} — filtreret fra{' '}
                  {COMPANIES.length} selskaber
                </div>
              )}

              {isSkeleton ? (
                <SkeletonRows n={10} />
              ) : (
                <div className={viewMode !== 'kort' ? 'page-cols' : undefined}>
                  <div>
                    {viewMode === 'tabel' ? (
                      <div className="tbl-wrap">
                        {sorted.length === 0 ? (
                          <div className="empty">
                            <strong>Ingen selskaber matcher filteret</strong>Nulstil filteret.
                          </div>
                        ) : (
                          <table className="tbl">
                            <colgroup>
                              <col className="col-naam" />
                              <col className="col-cvr" />
                              <col className="col-type" />
                              <col className="col-ejer" />
                              <col className="col-kontr" />
                              <col className="col-sager" />
                              <col className="col-ebit" />
                              <col className="col-hlth" />
                              <col className="col-act" />
                            </colgroup>
                            <thead>
                              <tr>
                                <Th col="navn" label="Selskab" cls="col-naam" />
                                <Th col="cvr" label="CVR" cls="col-cvr" />
                                <Th col="type" label="Type" cls="col-type" />
                                <Th col="ejer" label="Kæde %" cls="col-ejer" />
                                <Th col="kontr" label="Kontrakter" cls="col-kontr" />
                                <Th col="sager" label="Sager" cls="col-sager" />
                                <Th col="ebitda" label="EBITDA" cls="col-ebit" />
                                <Th col="score" label="Health" cls="col-hlth" />
                                <th className="col-act"></th>
                              </tr>
                            </thead>
                            <tbody>
                              {paged.map((c) => (
                                <CoRow key={c.id} c={c} onToast={doToast} />
                              ))}
                            </tbody>
                          </table>
                        )}
                      </div>
                    ) : viewMode === 'grupperet' ? (
                      <GroupedView companies={sorted} onToast={doToast} />
                    ) : (
                      <CardView companies={sorted} onToast={doToast} />
                    )}

                    {viewMode !== 'kort' && sorted.length > 0 && (
                      <div className="pager" style={{ marginTop: 8 }}>
                        <span className="pager-info">
                          {viewMode === 'tabel'
                            ? `${Math.min((page - 1) * pageSize + 1, sorted.length)}–${Math.min(page * pageSize, sorted.length)} af ${sorted.length}`
                            : `${sorted.length} selskaber`}
                        </span>
                        {viewMode === 'tabel' && (
                          <>
                            <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                              <button
                                className="pg-btn"
                                disabled={page === 1}
                                onClick={() => setPage((p) => p - 1)}
                              >
                                ←
                              </button>
                              <span style={{ fontSize: 12, color: '#6e7681', padding: '0 4px' }}>
                                {page} / {maxPage}
                              </span>
                              <button
                                className="pg-btn"
                                disabled={page === maxPage}
                                onClick={() => setPage((p) => p + 1)}
                              >
                                →
                              </button>
                            </div>
                            <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                              <span style={{ fontSize: 11, color: '#6e7681' }}>Vis:</span>
                              {[15, 25, 50].map((n) => (
                                <button
                                  key={n}
                                  className={`psz-btn${pageSize === n ? ' on' : ''}`}
                                  onClick={() => {
                                    setPageSize(n)
                                    setPage(1)
                                  }}
                                >
                                  {n}
                                </button>
                              ))}
                            </div>
                          </>
                        )}
                      </div>
                    )}
                  </div>

                  {/* Right rail kun ved tabel+regioner */}
                  {(viewMode === 'tabel' || viewMode === 'grupperet') && (
                    <RightRail companies={COMPANIES} onToast={doToast} />
                  )}
                </div>
              )}

              <div className="bot-bar">
                <span>
                  {isSkeleton
                    ? 'Henter…'
                    : `${sorted.length} selskaber vist · ${COMPANIES.filter((c) => c.health.startsWith('g')).length} grønne`}
                </span>
                <span>
                  <span className="kbd">⌘K</span> handling · <span className="kbd">N</span> nyt
                  selskab · <span className="kbd">F</span> filter
                </span>
              </div>
            </main>
            {toast && (
              <div className="toast" key={toastKey}>
                ✓ {toast}
              </div>
            )}
          </div>
        )
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<SelskaborPage />)
    </script>
  </body>
</html>
