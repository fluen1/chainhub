      /* ─── HELPERS ─── */
      function parseDK(str) {
        if (!str || !str.toString().trim()) return null
        const n = parseFloat(str.toString().replace(/\./g, '').replace(',', '.'))
        return isNaN(n) ? null : n
      }

      function fmtCompact(num, enhed) {
        if (num === null || num === undefined || isNaN(num)) return '—'
        if (enhed === '%') return num.toFixed(1).replace('.', ',') + '%'
        if (enhed === 'antal') return num.toFixed(0)
        const abs = Math.abs(num)
        if (abs >= 1000000) return (num / 1000000).toFixed(2).replace('.', ',') + 'm'
        if (abs >= 1000) return Math.round(num / 1000) + 'k'
        return num.toFixed(0)
      }

      function trendPct(curr, prev) {
        if (prev === null || prev === undefined || prev === 0) return null
        return ((curr - prev) / Math.abs(prev)) * 100
      }

      function TrendBadge({ pct }) {
        if (pct === null)
          return (
            <span className="hist-trn" style={{ color: '#8c959f' }}>
              —
            </span>
          )
        const up = pct >= 0
        const color = up ? '#1a7f37' : '#cf222e'
        const sign = up ? '+' : ''
        const arrow = up ? '↑' : '↓'
        return (
          <span className="hist-trn" style={{ color }}>
            {arrow} {sign}
            {Math.abs(pct).toFixed(1).replace('.', ',')}%
          </span>
        )
      }

                    border: '1px solid #c4b5fd',
                    borderRadius: '3px',
                  }}
                >
                  <div
                    style={{
                      fontSize: '10px',
                      fontWeight: 700,
                      color: '#7c3aed',
                      textTransform: 'uppercase',
                      letterSpacing: '0.5px',
                      marginBottom: 5,
                    }}
                  >
                    ⚡ Renewal-risk · 82% conf.
                  </div>
                  <div style={{ fontSize: '12px', color: '#4c1d95', lineHeight: 1.45 }}>
                    Forventet markedsleje 10–12% over nuværende kontrakt. Anbefaling: start
                    forhandling nu.
                  </div>
                </div>
              </div>
            </div>
          </div>
        )
      }

      /* ─── MAIN MODAL ─── */
      function AddFinansModal() {
        const [metricType, setMetricType] = useState('')
        const [andetMetric, setAndetMetric] = useState('')
        const [beloebStr, setBeloebStr] = useState('')
        const [enhed, setEnhed] = useState('kr')
        const [periodeType, setPeriodeType] = useState('Kvartal')
        const [specifPer, setSpecifPer] = useState('Q1 2026')
        const [kilde, setKilde] = useState('Manuel')
        const [note, setNote] = useState('')
        const [conflictAck, setConflictAck] = useState(false)
        const [toast, setToast] = useState(null)
        const [toastKey, setToastKey] = useState(0)
        const stRef = useRef({})

        /* Reset conflictAck when key fields change */
        useEffect(() => {
          setConflictAck(false)
        }, [metricType, specifPer])

        /* Auto-set enhed on metric change */
        useEffect(() => {
          if (METRIC_DEFAULT_ENHED[metricType]) setEnhed(METRIC_DEFAULT_ENHED[metricType])
        }, [metricType])

        /* Auto-set first period when period type changes */
        useEffect(() => {
          setSpecifPer(PERIOD_OPTIONS[periodeType][0])
        }, [periodeType])

        /* ── Derived ── */
        const metricLabel = metricType === 'Andet' ? andetMetric.trim() || 'Andet' : metricType
        const beloebNum = parseDK(beloebStr)
        const beloebInvalid = beloebStr.trim() !== '' && beloebNum === null
        const historicData = METRIC_HISTORY[metricType] || []
        const conflictEntry = historicData.find((h) => h.periode === specifPer) || null
        const hasConflict = !!conflictEntry
        const showHistorik = !!metricType && metricType !== 'Andet' && historicData.length > 0
        const last3 = historicData.filter((h) => h.periode !== specifPer).slice(0, 3)
        const canSubmit =
          !!metricType &&
          (metricType !== 'Andet' || !!andetMetric.trim()) &&
          beloebNum !== null &&
          !!specifPer &&
          (!hasConflict || conflictAck)

        /* Trend for new entry vs most recent historik entry */
        const newTrendPct =
          beloebNum !== null && last3.length > 0 ? trendPct(beloebNum, last3[0].val) : null

        /* Stale-closure guard */
        stRef.current = { canSubmit, metricLabel, specifPer, hasConflict, conflictAck }

        /* Keyboard */
        useEffect(() => {
          function onKey(e) {
            if (e.key === 'Escape') doToast('Modal lukket')
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
              const s = stRef.current
              if (s.canSubmit) {
                const verb = s.hasConflict && s.conflictAck ? 'erstattet' : 'tilføjet'
                doToast(`Metric ${verb} · ${s.metricLabel} ${s.specifPer}`)
              }
            }
          }
          document.addEventListener('keydown', onKey)
          return () => document.removeEventListener('keydown', onKey)
        }, [])

        function doToast(msg) {
          setToast(msg)
          setToastKey((k) => k + 1)
          setTimeout(() => setToast(null), 3200)
        }

        function handleSubmit() {
          if (!canSubmit) return
          const verb = hasConflict && conflictAck ? 'erstattet' : 'tilføjet'
          doToast(`Metric ${verb} · ${metricLabel} ${specifPer}`)
        }

        /* ── Render ── */
        return (
          <div className="scene">
            {/* Dimmed background */}
            <div className="bg">
              <Sidebar />
              <BgMain />
            </div>

            {/* Backdrop + modal */}
            <div className="overlay">
              <div className="modal">
                {/* Header */}
                <div className="modal-h">
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div className="modal-ti">Tilføj finansiel metric · Tandlæge Østerbro ApS</div>
                    <div className="modal-su">
                      Q1 2026 · Sidste rapport 28. apr ·{' '}
                      {Object.values(METRIC_HISTORY).reduce((a, arr) => a + arr.length, 0)}{' '}
                      eksisterende målinger
                    </div>
                  </div>
                  <button className="modal-x" onClick={() => doToast('Modal lukket')}>
                    ×
                  </button>
                </div>

                {/* Body */}
                <div className="modal-bd">
                  {/* 1. Metric-type */}
                  <div className="field">
                    <label className="fl">
                      Metric-type <span className="req">*</span>
                    </label>
                    <div className="role-grid">
                      {METRIC_TYPES.map((m) => (
                        <button
                          key={m}
                          className={`rbtn${metricType === m ? ' on' : ''}`}
                          onClick={() => setMetricType(m)}
                        >
                          {m}
                        </button>
                      ))}
                    </div>
                    {metricType === 'Andet' && (
                      <input
                        className="fi"
                        style={{ marginTop: 7 }}
                        autoFocus
                        placeholder="Angiv metric-navn..."
                        value={andetMetric}
                        onChange={(e) => setAndetMetric(e.target.value)}
                      />
                    )}
                  </div>

                  {/* 2+3. Beløb + Enhed */}
                  <div className="frow" style={{ gridTemplateColumns: '3fr 2fr' }}>
                    <div className="field">
                      <label className="fl">
                        Beløb <span className="req">*</span>
                      </label>
                      <input
                        className="fi"
                        style={{ fontVariantNumeric: 'tabular-nums' }}
                        placeholder="1.840.000,00"
                        value={beloebStr}
                        onChange={(e) => setBeloebStr(e.target.value)}
                      />
                      {beloebInvalid && (
                        <div className="fhint err">
                          Ugyldigt format — brug komma som decimal (fx 1.840.000,00)
                        </div>
                      )}
                    </div>
                    <div className="field">
                      <label className="fl">Enhed</label>
                      <div className="seg" style={{ width: '100%' }}>
                        {ENHED_OPTS.map((u) => (
                          <button
                            key={u}
                            className={`sopt sm${enhed === u ? ' on' : ''}`}
                            style={{ flex: 1, textAlign: 'center' }}
                            onClick={() => setEnhed(u)}
                          >
                            {u}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* 4. Periode */}
                  <div className="frow">
                    <div className="field">
                      <label className="fl">Periode-type</label>
                      <div className="seg">
                        {['Måned', 'Kvartal', 'År'].map((pt) => (
                          <button
                            key={pt}
                            className={`sopt${periodeType === pt ? ' on' : ''}`}
                            style={{ flex: 1, textAlign: 'center' }}
                            onClick={() => setPeriodeType(pt)}
                          >
                            {pt}
                          </button>
                        ))}
                      </div>
                    </div>
                    <div className="field">
                      <label className="fl">
                        Periode <span className="req">*</span>
                      </label>
                      <select
                        className="fi"
                        value={specifPer}
                        onChange={(e) => setSpecifPer(e.target.value)}
                      >
                        {PERIOD_OPTIONS[periodeType].map((p) => (
                          <option key={p} value={p}>
                            {p}
                          </option>
                        ))}
                      </select>
                    </div>
                  </div>

                  {/* 5. Kilde */}
                  <div className="field">
                    <label className="fl">Kilde</label>
                    <div className="role-grid">
                      {KILDE_OPTS.map((k) => (
                        <button
                          key={k}
                          className={`rbtn${kilde === k ? ' on' : ''}`}
                          onClick={() => setKilde(k)}
                        >
                          {k}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Conflict warning */}
                  {hasConflict && !conflictAck && (
                    <div className="warn-box">
                      <strong>
                        {metricLabel} {specifPer} er allerede registreret ({conflictEntry.m}).
                      </strong>{' '}
                      Vil du erstatte den eksisterende registrering?
                      <div style={{ display: 'flex', gap: 6, marginTop: 9 }}>
                        <button className="btn warn-cancel" onClick={() => doToast('Annulleret')}>
                          Annuller
                        </button>
                        <button className="btn warn-act" onClick={() => setConflictAck(true)}>
                          Erstat eksisterende
                        </button>
                      </div>
                    </div>
                  )}

                  {/* Conflict replace confirmed */}
                  {hasConflict && conflictAck && (
                    <div className="info-box">
                      Du erstatter{' '}
                      <strong>
                        {metricLabel} {specifPer}
                      </strong>{' '}
                      ({conflictEntry.m}) med den nye registrering.
                      <button
                        style={{
                          background: 'none',
                          border: 'none',
                          color: '#0969da',
                          fontSize: 11,
                          cursor: 'pointer',
                          marginLeft: 8,
                          fontFamily: 'inherit',
                          padding: 0,
                        }}
                        onClick={() => setConflictAck(false)}
                      >
                        Fortryd
                      </button>
                    </div>
                  )}

                  {/* Live preview: historik */}
                  {showHistorik && (
                    <div className="ctx-pnl">
                      <div className="ctx-l">Historik · {metricLabel.toUpperCase()}</div>

                      {last3.length === 0 && (
                        <div style={{ fontSize: 12, color: '#8c959f', padding: '4px 0' }}>
                          Ingen tidligere registreringer for denne periode-type.
                        </div>
                      )}

                      {last3.map((entry, i) => {
                        const prev = last3[i + 1] || null
                        const pct = prev ? trendPct(entry.val, prev.val) : null
                        return (
                          <div key={entry.periode} className="hist-row">
                            <span className="hist-per">{entry.periode}</span>
                            <span className="hist-val">{entry.m}</span>
                            <TrendBadge pct={pct} />
                          </div>
                        )
                      })}

                      {/* New entry row */}
                      {beloebNum !== null && specifPer && (
                        <div className="hist-row new-e">
                          <span style={{ fontVariantNumeric: 'tabular-nums' }}>{specifPer}</span>
                          <span style={{ fontWeight: 500, fontVariantNumeric: 'tabular-nums' }}>
                            {fmtCompact(beloebNum, enhed)}
                            <span style={{ fontSize: 10, fontWeight: 400, marginLeft: 4 }}>
                              (ny)
                            </span>
                          </span>
                          {last3.length > 0 ? (
                            <TrendBadge pct={newTrendPct} />
                          ) : (
                            <span className="hist-trn" style={{ color: '#8c959f' }}>
                              —
                            </span>
                          )}
                        </div>
                      )}
                    </div>
                  )}

                  {/* 6. Note */}
                  <div className="field">
                    <label className="fl">Note (valgfri)</label>
                    <textarea
                      className="fi"
                      rows={2}
                      style={{ resize: 'none' }}
                      placeholder="Fx kilde-reference, justering ift. ekstraordinære poster..."
                      value={note}
                      onChange={(e) => setNote(e.target.value)}
                    />
                  </div>
                </div>
                {/* /modal-bd */}

                {/* Footer */}
                <div className="modal-ft">
                  <div className="kbd-hint">
                    <span className="kbd">Esc</span> luk
                    <span style={{ margin: '0 4px', color: '#d0d7de' }}>·</span>
                    <span className="kbd">⌘</span>
                    <span className="kbd">↵</span>
                    {hasConflict && conflictAck ? ' erstat' : ' tilføj'}
                  </div>
                  <div className="f-btns">
                    <button className="btn" onClick={() => doToast('Annulleret')}>
                      Annuller
                    </button>
                    <button className="btn p" disabled={!canSubmit} onClick={handleSubmit}>
                      {hasConflict && conflictAck ? 'Erstat metric' : 'Tilføj metric'}
                    </button>
                  </div>
                </div>
              </div>
            </div>

            {/* Toast */}
            {toast && (
              <div className="toast" key={toastKey}>
                ✓ {toast}
              </div>
            )}
          </div>
        )
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<AddFinansModal />)
    </script>
  </body>
</html>
