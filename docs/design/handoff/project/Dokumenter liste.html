<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dokumenter — ChainHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #fafafa; color: #1f2328; font-size: 13px; -webkit-font-smoothing: antialiased; }
    .layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sb      { background: #f6f7f9; border-right: 1px solid #e1e4e8; padding: 14px 8px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .sb-logo { font-weight: 600; padding: 4px 10px 16px; }
    .sb-sec  { margin-bottom: 16px; }
    .sb-lab  { font-size: 10px; color: #6e7681; padding: 0 10px 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .sb-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .sb-item.active { background: #e8eaee; font-weight: 500; }
    .sb-item:hover:not(.active) { background: #ecedf0; }
    .sb-cnt  { font-size: 11px; color: #6e7681; font-variant-numeric: tabular-nums; }
    .sb-cnt.a { color: #b91c1c; font-weight: 600; } .sb-cnt.w { color: #b54708; }

    /* ── MAIN ── */
    .main { padding: 12px 24px 24px; display: flex; flex-direction: column; gap: 10px; min-width: 0; }

    /* ── DEMO BAR ── */
    .demo-bar { display: flex; align-items: center; gap: 8px; padding: 5px 10px; background: #f6f7f9; border: 1px solid #e1e4e8; border-radius: 4px; font-size: 11px; color: #6e7681; }
    .demo-bar span { font-weight: 600; color: #8c959f; }
    .demo-btn { font-size: 11px; padding: 2px 8px; border: 1px solid #d0d7de; border-radius: 3px; background: white; color: #6e7681; cursor: pointer; font-family: inherit; }
    .demo-btn.on { background: #e8eaee; color: #1f2328; border-color: #c1c5cc; font-weight: 500; }
    .demo-btn:hover:not(.on) { background: #f6f8fa; }

    /* ── HEADER ── */
    .crumb    { font-size: 12px; color: #6e7681; padding: 4px 0 2px; }
    .head     { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 1px solid #e1e4e8; }
    .head h1  { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 3px; }
    .head-meta { font-size: 12px; color: #6e7681; font-variant-numeric: tabular-nums; }
    .hl-p    { color: #7c3aed; font-weight: 500; }
    .hl-a    { color: #b54708; font-weight: 500; }
    .sep-dot { margin: 0 8px; color: #d0d7de; }
    .btn     { font-size: 12px; padding: 5px 10px; border: 1px solid #d0d7de; background: white; color: #1f2328; border-radius: 4px; cursor: pointer; font-weight: 500; font-family: inherit; white-space: nowrap; }
    .btn:hover { background: #f6f8fa; }
    .btn.primary { background: #0969da; color: white; border-color: #0969da; }
    .btn.primary:hover { background: #0860c7; }

    /* ── ALERT ── */
    .alert-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; background: #ffebe9; border: 1px solid #ffc1ba; border-left: 3px solid #cf222e; border-radius: 4px; font-size: 13px; color: #6e1010; }

    /* ── STRIP ── */
    .strip { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: #e1e4e8; border: 1px solid #e1e4e8; border-radius: 4px; overflow: hidden; }
    .sc    { background: white; padding: 8px 12px; }
    .sn    { font-size: 16px; font-weight: 600; font-variant-numeric: tabular-nums; line-height: 1.1; color: #1f2328; }
    .sn.p  { color: #7c3aed; } .sn.w { color: #b54708; } .sn.a { color: #b91c1c; } .sn.g { color: #1a7f37; }
    .sl    { font-size: 10px; color: #6e7681; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.4px; }

    /* ── FILTER ROW ── */
    .filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; }
    .fi-search  { font-size: 12px; padding: 5px 10px; border: 1px solid #d0d7de; border-radius: 4px; background: white; font-family: inherit; width: 190px; outline: none; color: #1f2328; }
    .fi-search:focus { border-color: #0969da; outline: 2px solid #ddf4ff; outline-offset: 0; }
    .fi-search::placeholder { color: #8c959f; }
    .filter-sep { width: 1px; height: 20px; background: #e1e4e8; margin: 0 2px; flex-shrink: 0; }
    .f-btn   { font-size: 12px; padding: 5px 10px; border: 1px solid #d0d7de; background: white; color: #6e7681; border-radius: 4px; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .f-btn:hover { background: #f6f8fa; color: #1f2328; }
    .f-btn.on  { background: #ddf4ff; border-color: #0969da; color: #0969da; }
    .f-btn.att { background: #fff8c5; border-color: #d4a72c; color: #9a6700; font-weight: 500; }
    .f-btn.clr { color: #cf222e; border-color: #ffc1ba; }
    .f-btn.clr:hover { background: #ffebe9; }
    .filter-spacer { flex: 1; }
    .seg   { display: inline-flex; border: 1px solid #d0d7de; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
    .sopt  { padding: 5px 11px; font-size: 12px; color: #6e7681; background: white; border-right: 1px solid #d0d7de; cursor: pointer; font-family: inherit; }
    .sopt:last-child { border-right: none; }
    .sopt.on { background: #1f2328; color: white; }
    .sopt:hover:not(.on) { background: #f6f8fa; }

    /* ── DROPDOWN ── */
    .dd-wrap { position: relative; }
    .dd-menu { position: absolute; top: calc(100% + 3px); left: 0; min-width: 155px; background: white; border: 1px solid #d0d7de; border-radius: 4px; box-shadow: 0 8px 24px rgba(15,23,42,0.11); z-index: 200; overflow: hidden; }
    .dd-item { padding: 6px 12px; font-size: 12px; color: #1f2328; cursor: pointer; white-space: nowrap; }
    .dd-item:hover { background: #f6f7f9; }
    .dd-item.on { background: #ddf4ff; color: #0969da; font-weight: 500; }

    /* ── ATTENTION PANEL (Plus) ── */
    .att-panel { background: white; border: 1px solid #e1e4e8; border-radius: 4px; overflow: hidden; }
    .att-h   { padding: 6px 12px; border-bottom: 1px solid #e1e4e8; background: linear-gradient(135deg,#f3e8ff,#ede9fe); display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
    .att-ht  { font-size: 11px; font-weight: 700; color: #7c3aed; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
    .plus    { font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px; background: #f3e8ff; color: #7c3aed; text-transform: uppercase; letter-spacing: 0.4px; border: 1px solid #c4b5fd; }
    .att-hm  { font-size: 11px; color: #7c3aed; display: flex; align-items: center; gap: 8px; }
    .att-row { display: grid; grid-template-columns: 42px 1fr 160px 96px 90px 72px 80px; gap: 10px; padding: 6px 12px; border-bottom: 1px solid #f0f1f3; align-items: center; font-size: 13px; cursor: pointer; }
    .att-row:hover { background: #fdf8ff; }
    .att-row:last-child { border-bottom: none; }

    /* ── BADGES ── */
    .badge { font-size: 11px; font-weight: 500; padding: 1px 6px; border-radius: 3px; font-variant-numeric: tabular-nums; white-space: nowrap; display: inline-block; }
    .badge.red    { background: #ffebe9; color: #cf222e; }
    .badge.amber  { background: #fff8c5; color: #9a6700; }
    .badge.green  { background: #dafbe1; color: #1a7f37; }
    .badge.blue   { background: #ddf4ff; color: #0969da; }
    .badge.gray   { background: #f6f8fa; color: #57606a; }
    .badge.purple { background: #f3e8ff; color: #7c3aed; }

    /* ── TABLE ── */
    .tbl-wrap { background: white; border: 1px solid #e1e4e8; border-radius: 4px; overflow: hidden; }
    .tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .col-ext  { width: 52px; }
    .col-navn { width: auto; }
    .col-sel  { width: 165px; }
    .col-link { width: 160px; }
    .col-ai   { width: 88px; }
    .col-konf { width: 76px; }
    .col-att  { width: 88px; }
    .col-dato { width: 88px; }
    .col-act  { width: 20px; }
    .tbl th { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #6e7681; padding: 6px 12px; background: #fbfbfc; border-bottom: 1px solid #e1e4e8; text-align: left; cursor: pointer; user-select: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tbl th:hover { color: #1f2328; }
    .tbl th.sorted { color: #1f2328; }
    .tbl td { font-size: 13px; padding: 6px 12px; border-bottom: 1px solid #f0f1f3; color: #1f2328; vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: #f6f7f9; cursor: pointer; }
    .td-sec { color: #6e7681; font-size: 12px; }
    .chev   { color: #8c959f; }

    /* ── GROUPED ── */
    .grp-hdr { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: #f6f7f9; border-bottom: 1px solid #e1e4e8; cursor: pointer; user-select: none; }
    .grp-hdr:hover { background: #ecedf0; }
    .gh-tog  { font-size: 10px; color: #6e7681; width: 12px; flex-shrink: 0; }
    .gh-name { font-size: 12px; font-weight: 600; color: #1f2328; flex: 1; }
    .gh-cnt  { font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 10px; background: #e1e4e8; color: #57606a; font-variant-numeric: tabular-nums; }
    .gh-cnt.p { background: #f3e8ff; color: #7c3aed; }

    /* ── SKELETON ── */
    .skel { background: linear-gradient(90deg,#f0f1f3 25%,#f6f7f9 50%,#f0f1f3 75%); background-size: 200% 100%; animation: shimmer 1.6s infinite; border-radius: 3px; display: inline-block; }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

    /* ── PAGER ── */
    .pager      { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: white; border: 1px solid #e1e4e8; border-radius: 4px; }
    .pager-info { font-size: 12px; color: #6e7681; font-variant-numeric: tabular-nums; }
    .pg-btn  { font-size: 11px; padding: 3px 8px; border: 1px solid #d0d7de; background: white; color: #1f2328; border-radius: 3px; cursor: pointer; font-family: inherit; }
    .pg-btn:hover:not(:disabled) { background: #f6f8fa; }
    .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .psz-btn { font-size: 11px; padding: 2px 7px; border: 1px solid #d0d7de; background: white; color: #6e7681; border-radius: 3px; cursor: pointer; font-family: inherit; }
    .psz-btn.on { background: #e8eaee; color: #1f2328; border-color: #c1c5cc; font-weight: 500; }

    /* ── EMPTY ── */
    .empty { padding: 32px; text-align: center; color: #8c959f; font-size: 12px; }
    .empty strong { display: block; color: #6e7681; font-size: 13px; font-weight: 500; margin-bottom: 6px; }

    /* ── BOTTOM BAR ── */
    .bot-bar { display: flex; justify-content: space-between; padding: 6px 0; font-size: 11px; color: #6e7681; }
    .kbd { background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 3px; padding: 1px 5px; font-family: 'SF Mono','Fira Mono',monospace; font-size: 10px; color: #1f2328; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1f2328; color: white; padding: 9px 16px; border-radius: 4px; font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,0.22); z-index: 9000; white-space: nowrap; animation: tin .15s ease; }
    @keyframes tin { from{opacity:0;transform:translateX(-50%) translateY(5px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ─── DATA ─── */
const DOCS = [
  { id:1,  ext:'PDF',  navn:'lejekontrakt-2021.pdf',       selskab:'Tandlæge Østerbro ApS', link:'Lejekontrakt erhverv',   aiStatus:'AI ✓',    konf:94,  att:0, dato:'28. mar 2026', size:'2,4 MB' },
  { id:2,  ext:'PDF',  navn:'ejeraftale-final.pdf',         selskab:'Tandlæge Østerbro ApS', link:'Ejeraftale',             aiStatus:'Review',  konf:72,  att:2, dato:'12. mar 2026', size:'1,1 MB' },
  { id:3,  ext:'DOCX', navn:'ansaettelse-peter.docx',       selskab:'Tandlæge Østerbro ApS', link:'Peter Brandt',           aiStatus:'AI ✓',    konf:88,  att:1, dato:'8. mar 2026',  size:'340 KB' },
  { id:4,  ext:'PDF',  navn:'patientklage-brev.pdf',        selskab:'Klinik Aalborg',        link:'Sag #2841',              aiStatus:'AI ✓',    konf:91,  att:0, dato:'6. maj 2026',  size:'2,1 MB' },
  { id:5,  ext:'PDF',  navn:'forsikringspolice-2026.pdf',   selskab:'Klinik Odense',         link:'Forsikringspolice',      aiStatus:'Review',  konf:65,  att:3, dato:'2. mar 2026',  size:'1,8 MB' },
  { id:6,  ext:'PDF',  navn:'lejekontrakt-holstebro.pdf',  selskab:'Klinik Holstebro',      link:'Lejekontrakt erhverv',   aiStatus:'AI ✓',    konf:89,  att:0, dato:'14. jan 2025', size:'3,1 MB' },
  { id:7,  ext:'DOCX', navn:'ansaettelse-tina.docx',        selskab:'Klinik Aalborg',        link:'Tina Hansen',            aiStatus:'Afventer',konf:null,att:0, dato:'15. apr 2026', size:'280 KB' },
  { id:8,  ext:'PDF',  navn:'driftsaftale-2026.pdf',        selskab:'Klinik Aarhus',         link:'Driftsaftale',           aiStatus:'AI ✓',    konf:83,  att:1, dato:'1. jan 2026',  size:'950 KB' },
  { id:9,  ext:'PDF',  navn:'ejeraftale-esbjerg.pdf',       selskab:'Klinik Esbjerg',        link:'Ejeraftale',             aiStatus:'Review',  konf:70,  att:2, dato:'14. jun 2020', size:'1,4 MB' },
  { id:10, ext:'PNG',  navn:'kvittering-reparation.png',    selskab:'Klinik Holstebro',      link:'Forsikringssag',         aiStatus:'Ikke AI', konf:null,att:0, dato:'22. jan 2026', size:'420 KB' },
  { id:11, ext:'PDF',  navn:'bestyrelsesprotokol-q4.pdf',   selskab:'Klinik Aarhus',         link:'Bestyrelsesmøde Q4',     aiStatus:'Afventer',konf:null,att:0, dato:'10. jan 2026', size:'680 KB' },
  { id:12, ext:'PDF',  navn:'lejekontrakt-randers.pdf',     selskab:'Klinik Randers',        link:'Lejekontrakt erhverv',   aiStatus:'AI ✓',    konf:92,  att:0, dato:'1. sep 2022',  size:'2,7 MB' },
  { id:13, ext:'DOCX', navn:'bonus-aftale-2024.docx',       selskab:'Tandlæge Østerbro ApS', link:'Lars Hansen',            aiStatus:'AI ✓',    konf:85,  att:1, dato:'8. mar 2026',  size:'220 KB' },
  { id:14, ext:'PDF',  navn:'tilsynsrapport-2025.pdf',      selskab:'Klinik Odense',         link:'Tilsynsbesøg 2025',      aiStatus:'Ikke AI', konf:null,att:0, dato:'15. dec 2025', size:'1,2 MB' },
  { id:15, ext:'PDF',  navn:'ansaettelse-magnus.pdf',       selskab:'Klinik Holstebro',      link:'Magnus Andreasen',       aiStatus:'AI ✓',    konf:87,  att:0, dato:'1. aug 2020',  size:'310 KB' },
];

const UNIQUE_SEL    = [...new Set(DOCS.map(d => d.selskab))].sort();
const UNIQUE_EXT    = [...new Set(DOCS.map(d => d.ext))].sort();
const AI_STATUS_OPTS = ['Alle','AI ✓','Review','Afventer','Ikke AI'];

function konfBadge(konf) {
  if (konf === null) return null;
  if (konf >= 85) return { cls:'green', label:`AI ${konf}%` };
  if (konf >= 70) return { cls:'amber', label:`AI ${konf}%` };
  return { cls:'red', label:`AI ${konf}%` };
}
function attBadge(att) {
  if (att === 0) return null;
  if (att === 1) return { cls:'amber', label:'1 felt' };
  return { cls:'red', label:`${att} felter` };
}
function aiStatusBadge(s) {
  if (s === 'AI ✓')   return { cls:'green', label:'AI ✓' };
  if (s === 'Review')  return { cls:'amber', label:'Review' };
  if (s === 'Afventer')return { cls:'blue',  label:'Afventer' };
  return { cls:'gray', label:'Ikke AI' };
}
function extCls(ext) {
  if (ext === 'PDF')  return 'red';
  if (ext === 'DOCX') return 'blue';
  return 'gray';
}

/* ─── SIDEBAR ─── */
function Sidebar() {
  return (
    <aside className="sb">
      <div className="sb-logo">▣ ChainHub</div>
      <div className="sb-sec">
        <div className="sb-lab">Overblik</div>
        <div className="sb-item">Forside <span className="sb-cnt a">5</span></div>
        <div className="sb-item">Kalender <span className="sb-cnt">12</span></div>
        <div className="sb-item">Søg</div>
      </div>
      <div className="sb-sec">
        <div className="sb-lab">Portefølje</div>
        <div className="sb-item">Selskaber <span className="sb-cnt">32</span></div>
        <div className="sb-item">Kontrakter <span className="sb-cnt w">3</span></div>
        <div className="sb-item">Sager <span className="sb-cnt a">7</span></div>
        <div className="sb-item">Opgaver <span className="sb-cnt w">9</span></div>
      </div>
      <div className="sb-sec">
        <div className="sb-lab">Ressourcer</div>
        <div className="sb-item active">Dokumenter <span className="sb-cnt">412</span></div>
        <div className="sb-item">Personer <span className="sb-cnt">184</span></div>
        <div className="sb-item">Indstillinger</div>
      </div>
    </aside>
  );
}

/* ─── DROPDOWN ─── */
function Dd({ label, opts, value, onChange }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    function h(e) { if (!ref.current?.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  return (
    <div className="dd-wrap" ref={ref}>
      <button className={`f-btn${value && value !== 'Alle' ? ' on' : ''}`} onClick={() => setOpen(o => !o)}>
        {value && value !== 'Alle' ? value : label} ▾
      </button>
      {open && (
        <div className="dd-menu">
          {opts.map(o => (
            <div key={o} className={`dd-item${value === o ? ' on' : ''}`}
              onClick={() => { onChange(o); setOpen(false); }}>{o}</div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── SKELETON ─── */
function SkeletonRows({ n = 8 }) {
  return (
    <div className="tbl-wrap">
      {Array.from({length:n}).map((_,i) => (
        <div key={i} style={{display:'flex',gap:10,padding:'7px 12px',borderBottom:i<n-1?'1px solid #f0f1f3':'none',alignItems:'center'}}>
          <span className="skel" style={{width:40,height:18,borderRadius:3}}></span>
          <span className="skel" style={{width:200,height:12,flex:1}}></span>
          <span className="skel" style={{width:120,height:12}}></span>
          <span className="skel" style={{width:70,height:18,borderRadius:3}}></span>
          <span className="skel" style={{width:60,height:18,borderRadius:3}}></span>
          <span className="skel" style={{width:50,height:18,borderRadius:3}}></span>
        </div>
      ))}
    </div>
  );
}

/* ─── DOC ROW ─── */
function DocRow({ d, onToast }) {
  const aiBadge  = aiStatusBadge(d.aiStatus);
  const kBadge   = konfBadge(d.konf);
  const aBadge   = attBadge(d.att);
  return (
    <tr onClick={() => onToast(`Åbner ${d.navn}`)}>
      <td className="col-ext"><span className={`badge ${extCls(d.ext)}`}>{d.ext}</span></td>
      <td className="col-navn" style={{fontWeight:500}}>{d.navn} <span className="td-sec" style={{marginLeft:4}}>{d.size}</span></td>
      <td className="col-sel td-sec">{d.selskab}</td>
      <td className="col-link td-sec">{d.link}</td>
      <td className="col-ai"><span className={`badge ${aiBadge.cls}`}>{aiBadge.label}</span></td>
      <td className="col-konf">{kBadge ? <span className={`badge ${kBadge.cls}`}>{kBadge.label}</span> : <span style={{color:'#d0d7de'}}>—</span>}</td>
      <td className="col-att">{aBadge ? <span className={`badge ${aBadge.cls}`}>{aBadge.label}</span> : <span style={{color:'#d0d7de'}}>—</span>}</td>
      <td className="col-dato td-sec">{d.dato}</td>
      <td className="col-act"><span className="chev">›</span></td>
    </tr>
  );
}

/* ─── GROUPED VIEW ─── */
function GroupedView({ docs, onToast }) {
  const [collapsed, setCollapsed] = useState(new Set());
  const toggle = name => setCollapsed(prev => { const n = new Set(prev); n.has(name)?n.delete(name):n.add(name); return n; });
  const groups = docs.reduce((acc, d) => { (acc[d.selskab] = acc[d.selskab]||[]).push(d); return acc; }, {});
  return (
    <div className="tbl-wrap">
      {Object.entries(groups).map(([co, rows]) => {
        const needsAtt = rows.some(r => r.att > 0 || r.aiStatus === 'Review');
        const open = !collapsed.has(co);
        return (
          <div key={co}>
            <div className="grp-hdr" onClick={() => toggle(co)}>
              <span className="gh-tog">{open?'▾':'▸'}</span>
              <span className="gh-name">{co}</span>
              <span className={`gh-cnt${needsAtt?' p':''}`}>{rows.length}</span>
              {needsAtt && <span className="badge purple" style={{fontSize:10}}>⚡ Review</span>}
            </div>
            {open && (
              <table className="tbl" style={{tableLayout:'fixed',width:'100%'}}>
                <colgroup>
                  <col style={{width:52}}/><col/><col style={{width:165}}/><col style={{width:160}}/>
                  <col style={{width:88}}/><col style={{width:76}}/><col style={{width:88}}/><col style={{width:88}}/><col style={{width:20}}/>
                </colgroup>
                <tbody>
                  {rows.map(d => <DocRow key={d.id} d={d} onToast={onToast} />)}
                </tbody>
              </table>
            )}
          </div>
        );
      })}
      {docs.length === 0 && <div className="empty"><strong>Ingen dokumenter</strong>Juster filteret.</div>}
    </div>
  );
}

/* ─── MAIN ─── */
function DokumenterPage() {
  const [demo,      setDemo]      = useState('normal');
  const [viewMode,  setViewMode]  = useState('flat');
  const [search,    setSearch]    = useState('');
  const [selFil,    setSelFil]    = useState('Alle');
  const [extFil,    setExtFil]    = useState('Alle');
  const [aiFil,     setAiFil]     = useState('Alle');
  const [attOnly,   setAttOnly]   = useState(false);
  const [attOpen,   setAttOpen]   = useState(true);
  const [sortCol,   setSortCol]   = useState('dato');
  const [sortDir,   setSortDir]   = useState('desc');
  const [page,      setPage]      = useState(1);
  const [pageSize,  setPageSize]  = useState(15);
  const [toast,     setToast]     = useState(null);
  const [toastKey,  setToastKey]  = useState(0);

  const isSkeleton = demo === 'skeleton';
  const isError    = demo === 'fejl';

  function doToast(msg) { setToast(msg); setToastKey(k=>k+1); setTimeout(()=>setToast(null),2600); }

  function handleSort(col) {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('asc'); }
  }

  const attDocs    = DOCS.filter(d => d.att > 0 || (d.aiStatus === 'Review' && d.konf !== null));
  const filtered   = DOCS.filter(d => {
    const q = search.toLowerCase();
    if (q && !d.navn.toLowerCase().includes(q) && !d.selskab.toLowerCase().includes(q) && !d.link.toLowerCase().includes(q)) return false;
    if (selFil !== 'Alle' && d.selskab !== selFil) return false;
    if (extFil !== 'Alle' && d.ext !== extFil) return false;
    if (aiFil  !== 'Alle' && d.aiStatus !== aiFil) return false;
    if (attOnly && d.att === 0 && d.aiStatus !== 'Review') return false;
    return true;
  });

  const sorted = [...filtered].sort((a,b) => {
    const av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ?  1 : -1;
    return 0;
  });

  const paged    = sorted.slice((page-1)*pageSize, page*pageSize);
  const maxPage  = Math.max(1, Math.ceil(sorted.length / pageSize));
  const hasFilter = selFil !== 'Alle' || extFil !== 'Alle' || aiFil !== 'Alle' || search || attOnly;

  const aiCount  = DOCS.filter(d => d.aiStatus === 'AI ✓').length;
  const revCount = DOCS.filter(d => d.aiStatus === 'Review').length;
  const lowCount = DOCS.filter(d => d.konf !== null && d.konf < 70).length;
  const attCount = attDocs.length;

  const Th = ({ col, label, cls }) => (
    <th className={`${cls||''} ${sortCol===col?'sorted':''}`} onClick={() => handleSort(col)}>
      {label}{sortCol===col?(sortDir==='asc'?' ↑':' ↓'):''}
    </th>
  );

  return (
    <div className="layout">
      <Sidebar />
      <main className="main">

        <div className="demo-bar">
          <span>Demo:</span>
          {['normal','skeleton','fejl'].map(s => (
            <button key={s} className={`demo-btn${demo===s?' on':''}`} onClick={()=>setDemo(s)}>{s}</button>
          ))}
        </div>

        <div className="crumb">Dokumenter</div>

        {isError && (
          <div className="alert-bar">
            <strong>Kunne ikke hente dokumenter</strong> — prøv igen.
            <button className="btn" style={{marginLeft:12}}>Prøv igen</button>
          </div>
        )}

        <div className="head">
          <div>
            <h1>Dokumenter</h1>
            <div className="head-meta">
              412 i alt
              <span className="sep-dot">·</span>
              <span className="hl-p">{aiCount} AI-extracted</span>
              <span className="sep-dot">·</span>
              <span className="hl-a">{revCount} afventer review</span>
              <span className="sep-dot">·</span>
              {lowCount} lav konfidens
            </div>
          </div>
          <div style={{display:'flex',gap:6}}>
            <button className="btn primary" onClick={() => doToast('Upload dokument — åbner modal')}>↑ Upload dokument</button>
          </div>
        </div>

        {!isSkeleton && (
          <div className="strip">
            <div className="sc"><div className="sn">412</div><div className="sl">I alt</div></div>
            <div className="sc"><div className="sn g">{aiCount}</div><div className="sl">AI ✓</div></div>
            <div className="sc"><div className="sn w">{revCount}</div><div className="sl">Afventer review</div></div>
            <div className="sc"><div className="sn a">{lowCount}</div><div className="sl">Lav konfidens</div></div>
            <div className="sc"><div className="sn p">{attCount}</div><div className="sl">Opmærksomhedsfelter</div></div>
          </div>
        )}

        {!isSkeleton && (
          <div className="filter-row">
            <input className="fi-search" placeholder="Søg dokumenter..." value={search}
              onChange={e => { setSearch(e.target.value); setPage(1); }} />
            <Dd label="Selskab" opts={['Alle',...UNIQUE_SEL]}      value={selFil} onChange={v=>{setSelFil(v);setPage(1);}} />
            <Dd label="Filtype" opts={['Alle',...UNIQUE_EXT]}      value={extFil} onChange={v=>{setExtFil(v);setPage(1);}} />
            <Dd label="AI-status" opts={AI_STATUS_OPTS}             value={aiFil}  onChange={v=>{setAiFil(v);setPage(1);}} />
            <button className={`f-btn${attOnly?' att':''}`}
              onClick={() => { setAttOnly(v => !v); setPage(1); }}>
              {attOnly ? '⚡ Kræver review ×' : '⚡ Kræver review'}
            </button>
            {hasFilter && (
              <button className="f-btn clr"
                onClick={() => { setSearch(''); setSelFil('Alle'); setExtFil('Alle'); setAiFil('Alle'); setAttOnly(false); }}>
                Nulstil ×
              </button>
            )}
            <div className="filter-sep"></div>
            <div className="seg">
              {[['flat','Flat'],['grouped','Grupperet']].map(([v,l]) => (
                <button key={v} className={`sopt${viewMode===v?' on':''}`} onClick={() => setViewMode(v)}>{l}</button>
              ))}
            </div>
            <div className="filter-spacer"></div>
            <button className="f-btn">Eksportér ▾</button>
          </div>
        )}

        {hasFilter && !isSkeleton && (
          <div style={{fontSize:11,color:'#6e7681'}}>
            {sorted.length} resultat{sorted.length!==1?'er':''} — filtreret fra {DOCS.length} dokumenter
          </div>
        )}

        {/* Attention panel — Plus */}
        {!isSkeleton && !attOnly && !hasFilter && attDocs.length > 0 && (
          <div className="att-panel">
            <div className="att-h" onClick={() => setAttOpen(v => !v)}>
              <div className="att-ht">
                ⚡ Kræver gennemgang
                <span className="plus">PLUS</span>
              </div>
              <div className="att-hm">
                <span>{attDocs.length} dokumenter med opmærksomhedsfelter</span>
                <span style={{fontSize:10}}>{attOpen ? '▾' : '▸'}</span>
              </div>
            </div>
            {attOpen && (
              <>
                <div style={{display:'grid',gridTemplateColumns:'42px 1fr 160px 96px 90px 72px 80px',gap:10,padding:'5px 12px',background:'#fbfbfc',borderBottom:'1px solid #e1e4e8'}}>
                  {['Fil','Navn','Selskab','Tilknyttet','AI','Konfidens','Felter'].map(h => (
                    <span key={h} style={{fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.5px',color:'#8c959f'}}>{h}</span>
                  ))}
                </div>
                {attDocs.map(d => {
                  const kBadge = konfBadge(d.konf);
                  const aBadge = attBadge(d.att);
                  const aiBadge = aiStatusBadge(d.aiStatus);
                  return (
                    <div key={d.id} className="att-row" onClick={() => doToast(`Åbner review af ${d.navn}`)}>
                      <span className={`badge ${extCls(d.ext)}`}>{d.ext}</span>
                      <span style={{fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.navn}</span>
                      <span style={{fontSize:12,color:'#6e7681',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.selskab}</span>
                      <span style={{fontSize:12,color:'#6e7681',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.link}</span>
                      <span className={`badge ${aiBadge.cls}`}>{aiBadge.label}</span>
                      {kBadge ? <span className={`badge ${kBadge.cls}`}>{kBadge.label}</span> : <span style={{color:'#d0d7de'}}>—</span>}
                      {aBadge ? <span className={`badge ${aBadge.cls}`}>{aBadge.label}</span> : <span style={{color:'#d0d7de'}}>—</span>}
                    </div>
                  );
                })}
              </>
            )}
          </div>
        )}

        {/* Main table */}
        {isSkeleton ? (
          <SkeletonRows n={8} />
        ) : viewMode === 'flat' ? (
          <div className="tbl-wrap">
            {sorted.length === 0
              ? <div className="empty"><strong>Ingen dokumenter matcher filteret</strong>Nulstil filteret eller upload et nyt dokument.</div>
              : (
                <table className="tbl">
                  <colgroup>
                    <col className="col-ext"/><col className="col-navn"/><col className="col-sel"/>
                    <col className="col-link"/><col className="col-ai"/><col className="col-konf"/>
                    <col className="col-att"/><col className="col-dato"/><col className="col-act"/>
                  </colgroup>
                  <thead>
                    <tr>
                      <Th col="ext"      label="Fil"        cls="col-ext" />
                      <Th col="navn"     label="Navn"       cls="col-navn" />
                      <Th col="selskab"  label="Selskab"    cls="col-sel" />
                      <Th col="link"     label="Tilknyttet" cls="col-link" />
                      <Th col="aiStatus" label="AI-status"  cls="col-ai" />
                      <Th col="konf"     label="Konfidens"  cls="col-konf" />
                      <Th col="att"      label="Opmærks."   cls="col-att" />
                      <Th col="dato"     label="Dato"       cls="col-dato" />
                      <th className="col-act"></th>
                    </tr>
                  </thead>
                  <tbody>
                    {paged.map(d => <DocRow key={d.id} d={d} onToast={doToast} />)}
                  </tbody>
                </table>
              )}
          </div>
        ) : (
          <GroupedView docs={sorted} onToast={doToast} />
        )}

        {!isSkeleton && viewMode === 'flat' && sorted.length > 0 && (
          <div className="pager">
            <span className="pager-info">
              {Math.min((page-1)*pageSize+1,sorted.length)}–{Math.min(page*pageSize,sorted.length)} af {sorted.length}
            </span>
            <div style={{display:'flex',gap:4,alignItems:'center'}}>
              <button className="pg-btn" disabled={page===1} onClick={()=>setPage(p=>p-1)}>←</button>
              <span style={{fontSize:12,color:'#6e7681',padding:'0 4px'}}>{page} / {maxPage}</span>
              <button className="pg-btn" disabled={page===maxPage} onClick={()=>setPage(p=>p+1)}>→</button>
            </div>
            <div style={{display:'flex',gap:4,alignItems:'center'}}>
              <span style={{fontSize:11,color:'#6e7681'}}>Vis:</span>
              {[15,25,50].map(n => (
                <button key={n} className={`psz-btn${pageSize===n?' on':''}`}
                  onClick={()=>{setPageSize(n);setPage(1);}}>{n}</button>
              ))}
            </div>
          </div>
        )}

        <div className="bot-bar">
          <span>
            {isSkeleton ? 'Henter…' : `${sorted.length} dokumenter vist · ${DOCS.filter(d=>d.aiStatus==='AI ✓').length} AI-extracted`}
          </span>
          <span>
            <span className="kbd">⌘K</span> handling ·{' '}
            <span className="kbd">U</span> upload ·{' '}
            <span className="kbd">F</span> filter
          </span>
        </div>

      </main>
      {toast && <div className="toast" key={toastKey}>✓ {toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DokumenterPage />);
</script>
</body>
</html>
