<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sager — ChainHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #fafafa; color: #1f2328; font-size: 13px; -webkit-font-smoothing: antialiased; }
    .layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sb      { background: #f6f7f9; border-right: 1px solid #e1e4e8; padding: 14px 8px; font-size: 13px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .sb-logo { font-weight: 600; padding: 4px 10px 16px; }
    .sb-sec  { margin-bottom: 16px; }
    .sb-lab  { font-size: 10px; color: #6e7681; padding: 0 10px 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .sb-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
    .sb-item.active { background: #e8eaee; font-weight: 500; }
    .sb-item:hover:not(.active) { background: #ecedf0; }
    .sb-cnt  { font-size: 11px; color: #6e7681; font-variant-numeric: tabular-nums; }
    .sb-cnt.a { color: #b91c1c; font-weight: 600; } .sb-cnt.w { color: #b54708; }

    /* ── MAIN ── */
    .main { padding: 12px 24px 24px; display: flex; flex-direction: column; gap: 10px; min-width: 0; }

    /* ── DEMO BAR ── */
    .demo-bar { display: flex; align-items: center; gap: 8px; padding: 5px 10px; background: #f6f7f9; border: 1px solid #e1e4e8; border-radius: 4px; font-size: 11px; color: #6e7681; }
    .demo-bar span { font-weight: 600; color: #8c959f; }
    .demo-btn { font-size: 11px; padding: 2px 8px; border: 1px solid #d0d7de; border-radius: 3px; background: white; color: #6e7681; cursor: pointer; font-family: inherit; }
    .demo-btn.on { background: #e8eaee; color: #1f2328; border-color: #c1c5cc; font-weight: 500; }
    .demo-btn:hover:not(.on) { background: #f6f8fa; }

    /* ── HEADER ── */
    .crumb    { font-size: 12px; color: #6e7681; padding: 4px 0 2px; }
    .head     { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 1px solid #e1e4e8; }
    .head h1  { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 3px; }
    .head-meta { font-size: 12px; color: #6e7681; font-variant-numeric: tabular-nums; }
    .hl-red  { color: #b91c1c; font-weight: 500; }
    .hl-amb  { color: #b54708; font-weight: 500; }
    .sep-dot { margin: 0 8px; color: #d0d7de; }
    .head-btns { display: flex; gap: 6px; }
    .btn      { font-size: 12px; padding: 5px 10px; border: 1px solid #d0d7de; background: white; color: #1f2328; border-radius: 4px; cursor: pointer; font-weight: 500; font-family: inherit; white-space: nowrap; }
    .btn:hover { background: #f6f8fa; }
    .btn.primary { background: #0969da; color: white; border-color: #0969da; }
    .btn.primary:hover { background: #0860c7; }

    /* ── ALERT ── */
    .alert-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; background: #ffebe9; border: 1px solid #ffc1ba; border-left: 3px solid #cf222e; border-radius: 4px; font-size: 13px; color: #6e1010; }

    /* ── FILTER ROW ── */
    .filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; }
    .fi-search  { font-size: 12px; padding: 5px 10px; border: 1px solid #d0d7de; border-radius: 4px; background: white; font-family: inherit; width: 200px; outline: none; color: #1f2328; }
    .fi-search:focus { border-color: #0969da; outline: 2px solid #ddf4ff; outline-offset: 0; }
    .fi-search::placeholder { color: #8c959f; }
    .filter-sep { width: 1px; height: 20px; background: #e1e4e8; margin: 0 2px; flex-shrink: 0; }
    .f-btn   { font-size: 12px; padding: 5px 10px; border: 1px solid #d0d7de; background: white; color: #6e7681; border-radius: 4px; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .f-btn:hover { background: #f6f8fa; color: #1f2328; }
    .f-btn.on  { background: #ddf4ff; border-color: #0969da; color: #0969da; }
    .f-btn.clr { color: #cf222e; border-color: #ffc1ba; }
    .f-btn.clr:hover { background: #ffebe9; }
    .filter-spacer { flex: 1; }
    .seg   { display: inline-flex; border: 1px solid #d0d7de; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
    .sopt  { padding: 5px 11px; font-size: 12px; color: #6e7681; background: white; border-right: 1px solid #d0d7de; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .sopt:last-child { border-right: none; }
    .sopt.on { background: #1f2328; color: white; }
    .sopt:hover:not(.on) { background: #f6f8fa; }

    /* ── DROPDOWN ── */
    .dd-wrap { position: relative; }
    .dd-menu { position: absolute; top: calc(100% + 3px); left: 0; min-width: 160px; background: white; border: 1px solid #d0d7de; border-radius: 4px; box-shadow: 0 8px 24px rgba(15,23,42,0.11); z-index: 200; overflow: hidden; }
    .dd-item { padding: 6px 12px; font-size: 12px; color: #1f2328; cursor: pointer; white-space: nowrap; }
    .dd-item:hover { background: #f6f7f9; }
    .dd-item.on { background: #ddf4ff; color: #0969da; font-weight: 500; }
    .dd-div  { padding: 4px 12px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #8c959f; background: #fbfbfc; border-bottom: 1px solid #f0f1f3; }

    /* ── BADGES ── */
    .badge { font-size: 11px; font-weight: 500; padding: 1px 6px; border-radius: 3px; font-variant-numeric: tabular-nums; white-space: nowrap; display: inline-block; }
    .badge.red    { background: #ffebe9; color: #cf222e; }
    .badge.amber  { background: #fff8c5; color: #9a6700; }
    .badge.green  { background: #dafbe1; color: #1a7f37; }
    .badge.blue   { background: #ddf4ff; color: #0969da; }
    .badge.gray   { background: #f6f8fa; color: #57606a; }

    /* ── TABLE ── */
    .tbl-wrap { background: white; border: 1px solid #e1e4e8; border-radius: 4px; overflow: hidden; }
    .tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .col-nr    { width: 64px; }
    .col-type  { width: 140px; }
    .col-selskab { width: 180px; }
    .col-desc  { width: auto; }
    .col-prio  { width: 80px; }
    .col-status { width: 114px; }
    .col-frist { width: 74px; }
    .col-ans   { width: 74px; }
    .col-act   { width: 20px; }
    .tbl th { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #6e7681; padding: 6px 12px; background: #fbfbfc; border-bottom: 1px solid #e1e4e8; text-align: left; cursor: pointer; user-select: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tbl th:hover { color: #1f2328; }
    .tbl th.sorted { color: #1f2328; }
    .tbl td { font-size: 13px; padding: 6px 12px; border-bottom: 1px solid #f0f1f3; color: #1f2328; vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: #f6f7f9; cursor: pointer; }
    .td-nr  { font-variant-numeric: tabular-nums; color: #6e7681; font-size: 12px; }
    .td-sec { color: #6e7681; font-size: 12px; }
    .chev   { color: #8c959f; }

    /* ── GROUPED ── */
    .grp-hdr { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: #f6f7f9; border-bottom: 1px solid #e1e4e8; cursor: pointer; user-select: none; }
    .grp-hdr:hover { background: #ecedf0; }
    .gh-tog  { font-size: 10px; color: #6e7681; width: 12px; flex-shrink: 0; }
    .gh-name { font-size: 12px; font-weight: 600; color: #1f2328; flex: 1; }
    .gh-cnt  { font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 10px; background: #e1e4e8; color: #57606a; font-variant-numeric: tabular-nums; }
    .gh-cnt.alert { background: #ffebe9; color: #cf222e; }

    /* ── KANBAN ── */
    .kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; align-items: start; }
    .kb-col { background: white; border: 1px solid #e1e4e8; border-radius: 4px; overflow: hidden; }
    .kb-h   { padding: 6px 10px; border-bottom: 1px solid #e1e4e8; display: flex; justify-content: space-between; align-items: center; }
    .kb-ht  { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .kb-hc  { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 10px; background: #e1e4e8; color: #57606a; font-variant-numeric: tabular-nums; }
    .kb-h.open      { background: #fbfbfc; }
    .kb-h.progress  { background: #fff8c5; }
    .kb-h.progress .kb-ht { color: #9a6700; }
    .kb-h.progress .kb-hc { background: #f5d673; color: #9a6700; }
    .kb-h.escalated { background: #ffebe9; }
    .kb-h.escalated .kb-ht { color: #cf222e; }
    .kb-h.escalated .kb-hc { background: #ffc1ba; color: #cf222e; }
    .kb-h.closed    { background: #f6f8fa; }
    .kb-h.closed    .kb-ht { color: #57606a; }
    .kb-card { padding: 7px 10px; border-bottom: 1px solid #f0f1f3; cursor: pointer; }
    .kb-card:hover { background: #f6f7f9; }
    .kb-card:last-child { border-bottom: none; }
    .kbc-nr   { font-size: 11px; color: #6e7681; font-variant-numeric: tabular-nums; }
    .kbc-type { font-size: 12px; font-weight: 500; color: #1f2328; margin-bottom: 2px; }
    .kbc-co   { font-size: 11px; color: #6e7681; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .kbc-tags { display: flex; gap: 4px; flex-wrap: wrap; }

    /* ── SKELETON ── */
    .skel { background: linear-gradient(90deg,#f0f1f3 25%,#f6f7f9 50%,#f0f1f3 75%); background-size: 200% 100%; animation: shimmer 1.6s infinite; border-radius: 3px; display: inline-block; }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

    /* ── PAGER ── */
    .pager      { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: white; border: 1px solid #e1e4e8; border-radius: 4px; }
    .pager-info { font-size: 12px; color: #6e7681; font-variant-numeric: tabular-nums; }
    .pg-btn  { font-size: 11px; padding: 3px 8px; border: 1px solid #d0d7de; background: white; color: #1f2328; border-radius: 3px; cursor: pointer; font-family: inherit; }
    .pg-btn:hover:not(:disabled) { background: #f6f8fa; }
    .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .psz-btn { font-size: 11px; padding: 2px 7px; border: 1px solid #d0d7de; background: white; color: #6e7681; border-radius: 3px; cursor: pointer; font-family: inherit; }
    .psz-btn.on { background: #e8eaee; color: #1f2328; border-color: #c1c5cc; font-weight: 500; }

    /* ── EMPTY ── */
    .empty { padding: 32px; text-align: center; color: #8c959f; font-size: 12px; }
    .empty strong { display: block; color: #6e7681; font-size: 13px; font-weight: 500; margin-bottom: 6px; }

    /* ── BOTTOM BAR ── */
    .bot-bar { display: flex; justify-content: space-between; padding: 6px 0; font-size: 11px; color: #6e7681; }
    .kbd { background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 3px; padding: 1px 5px; font-family: 'SF Mono','Fira Mono',monospace; font-size: 10px; color: #1f2328; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1f2328; color: white; padding: 9px 16px; border-radius: 4px; font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,0.22); z-index: 9000; white-space: nowrap; animation: tin .15s ease; }
    @keyframes tin { from{opacity:0;transform:translateX(-50%) translateY(5px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ─── DATA ─── */
const CASES = [
  { id:'#2841', type:'Patientklage',    selskab:'Klinik Aalborg',        desc:'Klage over behandlingsforløb mar 2026',            prio:'Kritisk', status:'Åben',          frist:'13. maj', fristDays:2,   ansvarlig:'Philip' },
  { id:'#2840', type:'Forhandling',     selskab:'Tandlæge Østerbro ApS', desc:'Forhandling med udlejer om lejekontrakt',          prio:'Høj',     status:'Åben',          frist:'—',       fristDays:9999,ansvarlig:'Philip' },
  { id:'#2839', type:'Tilsyn',          selskab:'Klinik Odense',         desc:'Sundhedsstyrelsens tilsynsbesøg 12. maj',          prio:'Normal',  status:'I behandling',  frist:'12. maj', fristDays:1,   ansvarlig:'Marie'  },
  { id:'#2838', type:'Personaleklage',  selskab:'Klinik Aarhus',         desc:'Klage over arbejdsmiljø fra ansat',                prio:'Høj',     status:'Afventer svar', frist:'20. maj', fristDays:9,   ansvarlig:'Philip' },
  { id:'#2837', type:'Forsikringssag',  selskab:'Klinik Holstebro',      desc:'Vandskade i klinik jan 2026',                     prio:'Normal',  status:'I behandling',  frist:'—',       fristDays:9999,ansvarlig:'Marie'  },
  { id:'#2835', type:'Patientklage',    selskab:'Klinik Esbjerg',        desc:'Klage over journalføring 2025',                   prio:'Normal',  status:'Afventer svar', frist:'28. maj', fristDays:17,  ansvarlig:'Philip' },
  { id:'#2833', type:'Juridisk tvist',  selskab:'Klinik Randers',        desc:'Tvist om opsigelsesvarsel med tidligere ansat',   prio:'Høj',     status:'Eskaleret',     frist:'15. maj', fristDays:4,   ansvarlig:'Philip' },
  { id:'#2829', type:'Kontraktbrud',    selskab:'Klinik Silkeborg',      desc:'Leverandør overholdt ikke driftsaftale',          prio:'Normal',  status:'Åben',          frist:'30. maj', fristDays:19,  ansvarlig:'Marie'  },
  { id:'#2821', type:'Skattesag',       selskab:'Klinik Aalborg',        desc:'SKAT anmoder om dokumentation Q4 2025',           prio:'Høj',     status:'Afventer svar', frist:'5. jun',  fristDays:25,  ansvarlig:'Philip' },
  { id:'#2815', type:'Tilsyn',          selskab:'Klinik Vejle',          desc:'Kommunalt tilsyn planlagt maj 2026',              prio:'Normal',  status:'Åben',          frist:'28. maj', fristDays:17,  ansvarlig:'Marie'  },
  { id:'#2801', type:'Personaleklage',  selskab:'Tandlæge Østerbro ApS', desc:'Klage over manglende overenskomstbetaling',       prio:'Høj',     status:'Løst',          frist:'—',       fristDays:9999,ansvarlig:'Philip' },
  { id:'#2789', type:'Patientklage',    selskab:'Klinik Aarhus',         desc:'Patient utilfreds med ventetid og resultat',      prio:'Normal',  status:'Lukket',        frist:'—',       fristDays:9999,ansvarlig:'Marie'  },
];

const UNIQUE_SELSKABER = [...new Set(CASES.map(c => c.selskab))].sort();
const UNIQUE_TYPES     = [...new Set(CASES.map(c => c.type))].sort();
const UNIQUE_PRIO      = ['Alle','Kritisk','Høj','Normal','Lav'];
const STATUS_OPTS      = ['Alle','Åben','I behandling','Afventer svar','Eskaleret','Løst','Lukket'];

const PRIO_CLS   = { Kritisk:'red', Høj:'amber', Normal:'blue', Lav:'gray' };
const STATUS_CLS = { 'Åben':'blue','I behandling':'amber','Afventer svar':'amber','Eskaleret':'red','Løst':'green','Lukket':'gray' };

function fristCls(days) { if (days < 0) return 'red'; if (days <= 3) return 'red'; if (days <= 14) return 'amber'; return 'gray'; }

/* ─── SIDEBAR ─── */
function Sidebar() {
  return (
    <aside className="sb">
      <div className="sb-logo">▣ ChainHub</div>
      <div className="sb-sec">
        <div className="sb-lab">Overblik</div>
        <div className="sb-item">Forside <span className="sb-cnt a">5</span></div>
        <div className="sb-item">Kalender <span className="sb-cnt">12</span></div>
        <div className="sb-item">Søg</div>
      </div>
      <div className="sb-sec">
        <div className="sb-lab">Portefølje</div>
        <div className="sb-item">Selskaber <span className="sb-cnt">32</span></div>
        <div className="sb-item">Kontrakter <span className="sb-cnt w">3</span></div>
        <div className="sb-item active">Sager <span className="sb-cnt a">7</span></div>
        <div className="sb-item">Opgaver <span className="sb-cnt w">9</span></div>
      </div>
      <div className="sb-sec">
        <div className="sb-lab">Ressourcer</div>
        <div className="sb-item">Dokumenter <span className="sb-cnt">412</span></div>
        <div className="sb-item">Personer <span className="sb-cnt">184</span></div>
        <div className="sb-item">Indstillinger</div>
      </div>
    </aside>
  );
}

/* ─── DROPDOWN ─── */
function Dd({ label, opts, value, onChange, divider }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    function h(e) { if (!ref.current?.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  return (
    <div className="dd-wrap" ref={ref}>
      <button className={`f-btn${value && value !== 'Alle' ? ' on' : ''}`} onClick={() => setOpen(o => !o)}>
        {value && value !== 'Alle' ? value : label} ▾
      </button>
      {open && (
        <div className="dd-menu">
          {divider && <div className="dd-div">{divider}</div>}
          {opts.map(o => (
            <div key={o} className={`dd-item${value === o ? ' on' : ''}`}
              onClick={() => { onChange(o); setOpen(false); }}>{o}</div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── CASE ROW ─── */
function CaseRow({ c, onToast }) {
  return (
    <tr onClick={() => onToast(`Åbner sag ${c.id}`)}>
      <td className="col-nr td-nr">{c.id}</td>
      <td className="col-type" style={{fontWeight:500}}>{c.type}</td>
      <td className="col-selskab td-sec">{c.selskab}</td>
      <td className="col-desc td-sec">{c.desc}</td>
      <td className="col-prio"><span className={`badge ${PRIO_CLS[c.prio]||'gray'}`}>{c.prio}</span></td>
      <td className="col-status"><span className={`badge ${STATUS_CLS[c.status]||'gray'}`}>{c.status}</span></td>
      <td className="col-frist">
        {c.frist === '—'
          ? <span style={{color:'#d0d7de'}}>—</span>
          : <span className={`badge ${fristCls(c.fristDays)}`}>{c.frist}</span>}
      </td>
      <td className="col-ans td-sec">{c.ansvarlig}</td>
      <td className="col-act"><span className="chev">›</span></td>
    </tr>
  );
}

/* ─── SKELETON ROWS ─── */
function SkeletonRows({ n = 8 }) {
  return (
    <div className="tbl-wrap">
      {Array.from({ length: n }).map((_, i) => (
        <div key={i} style={{ display:'flex', gap:10, padding:'7px 12px', borderBottom: i < n-1 ? '1px solid #f0f1f3' : 'none', alignItems:'center' }}>
          <span className="skel" style={{width:50,height:12}}></span>
          <span className="skel" style={{width:120,height:12}}></span>
          <span className="skel" style={{width:140,height:12}}></span>
          <span className="skel" style={{width:160,height:12,flex:1}}></span>
          <span className="skel" style={{width:56,height:18,borderRadius:3}}></span>
          <span className="skel" style={{width:80,height:18,borderRadius:3}}></span>
          <span className="skel" style={{width:56,height:18,borderRadius:3}}></span>
        </div>
      ))}
    </div>
  );
}

/* ─── GROUPED VIEW ─── */
function GroupedView({ cases, onToast }) {
  const [collapsed, setCollapsed] = useState(new Set());
  const toggle = name => setCollapsed(prev => { const n = new Set(prev); n.has(name)?n.delete(name):n.add(name); return n; });
  const groups = cases.reduce((acc, c) => { (acc[c.selskab] = acc[c.selskab]||[]).push(c); return acc; }, {});
  return (
    <div className="tbl-wrap">
      {Object.entries(groups).map(([co, rows]) => {
        const hasUrgent = rows.some(r => r.fristDays <= 3 || r.status === 'Eskaleret');
        const open = !collapsed.has(co);
        return (
          <div key={co}>
            <div className="grp-hdr" onClick={() => toggle(co)}>
              <span className="gh-tog">{open ? '▾' : '▸'}</span>
              <span className="gh-name">{co}</span>
              <span className={`gh-cnt${hasUrgent?' alert':''}`}>{rows.length}</span>
              {hasUrgent && <span className="badge red" style={{fontSize:10}}>⚠</span>}
            </div>
            {open && (
              <table className="tbl" style={{tableLayout:'fixed',width:'100%'}}>
                <colgroup>
                  <col style={{width:64}}/><col style={{width:140}}/><col style={{width:180}}/>
                  <col/><col style={{width:80}}/><col style={{width:114}}/><col style={{width:74}}/>
                  <col style={{width:74}}/><col style={{width:20}}/>
                </colgroup>
                <tbody>
                  {rows.map(c => <CaseRow key={c.id} c={c} onToast={onToast} />)}
                </tbody>
              </table>
            )}
          </div>
        );
      })}
      {cases.length === 0 && <div className="empty"><strong>Ingen sager</strong>Juster filteret.</div>}
    </div>
  );
}

/* ─── KANBAN ─── */
function KanbanView({ cases, onToast }) {
  const aaben   = cases.filter(c => c.status === 'Åben');
  const progress= cases.filter(c => c.status === 'I behandling' || c.status === 'Afventer svar');
  const eskal   = cases.filter(c => c.status === 'Eskaleret');
  const closed  = cases.filter(c => c.status === 'Løst' || c.status === 'Lukket');

  const KbCol = ({ title, cls, items, badge }) => (
    <div className="kb-col">
      <div className={`kb-h ${cls}`}>
        <span className="kb-ht">{title}</span>
        <span className="kb-hc">{items.length}</span>
      </div>
      {items.length === 0
        ? <div style={{padding:'10px 12px',fontSize:12,color:'#8c959f'}}>Ingen</div>
        : items.map(c => (
          <div key={c.id} className="kb-card" onClick={() => onToast(`Åbner ${c.id}`)}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
              <span className="kbc-nr">{c.id}</span>
              <span className={`badge ${PRIO_CLS[c.prio]}`} style={{fontSize:10}}>{c.prio}</span>
            </div>
            <div className="kbc-type">{c.type}</div>
            <div className="kbc-co">{c.selskab}</div>
            <div className="kbc-tags">
              {c.frist !== '—' && <span className={`badge ${fristCls(c.fristDays)}`} style={{fontSize:10}}>{c.frist}</span>}
              <span className="badge gray" style={{fontSize:10}}>{c.ansvarlig}</span>
            </div>
          </div>
        ))}
    </div>
  );

  return (
    <div className="kanban">
      <KbCol title="Åben"                 cls="open"      items={aaben}    />
      <KbCol title="I behandling"         cls="progress"  items={progress} />
      <KbCol title="Eskaleret"            cls="escalated" items={eskal}    />
      <KbCol title="Løst / Lukket"        cls="closed"    items={closed}   />
    </div>
  );
}

/* ─── MAIN ─── */
function SagerPage() {
  const [demo,      setDemo]      = useState('normal');
  const [viewMode,  setViewMode]  = useState('flat');
  const [search,    setSearch]    = useState('');
  const [selskabFil,setSelskabFil]= useState('Alle');
  const [typeFil,   setTypeFil]   = useState('Alle');
  const [prioFil,   setPrioFil]   = useState('Alle');
  const [statusFil, setStatusFil] = useState('Alle');
  const [sortCol,   setSortCol]   = useState('fristDays');
  const [sortDir,   setSortDir]   = useState('asc');
  const [page,      setPage]      = useState(1);
  const [pageSize,  setPageSize]  = useState(10);
  const [toast,     setToast]     = useState(null);
  const [toastKey,  setToastKey]  = useState(0);

  const isSkeleton = demo === 'skeleton';
  const isError    = demo === 'fejl';

  function doToast(msg) { setToast(msg); setToastKey(k=>k+1); setTimeout(()=>setToast(null),2600); }

  function handleSort(col) {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('asc'); }
  }

  const filtered = CASES.filter(c => {
    const q = search.toLowerCase();
    if (q && !c.selskab.toLowerCase().includes(q) && !c.type.toLowerCase().includes(q) && !c.id.toLowerCase().includes(q) && !c.desc.toLowerCase().includes(q)) return false;
    if (selskabFil !== 'Alle' && c.selskab !== selskabFil) return false;
    if (typeFil    !== 'Alle' && c.type    !== typeFil)    return false;
    if (prioFil    !== 'Alle' && c.prio    !== prioFil)    return false;
    if (statusFil  !== 'Alle' && c.status  !== statusFil)  return false;
    return true;
  });

  const sorted = [...filtered].sort((a,b) => {
    const av = a[sortCol] ?? 0, bv = b[sortCol] ?? 0;
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ?  1 : -1;
    return 0;
  });

  const paged   = sorted.slice((page-1)*pageSize, page*pageSize);
  const maxPage = Math.max(1, Math.ceil(sorted.length / pageSize));
  const hasFilter = selskabFil !== 'Alle' || typeFil !== 'Alle' || prioFil !== 'Alle' || statusFil !== 'Alle' || search;

  const Th = ({ col, label, cls }) => (
    <th className={`${cls||''} ${sortCol===col?'sorted':''}`} onClick={() => handleSort(col)}>
      {label}{sortCol===col?(sortDir==='asc'?' ↑':' ↓'):''}
    </th>
  );

  const openCount  = CASES.filter(c => c.status === 'Åben' || c.status === 'I behandling' || c.status === 'Afventer svar').length;
  const critCount  = CASES.filter(c => c.prio === 'Kritisk').length;
  const escalCount = CASES.filter(c => c.status === 'Eskaleret').length;

  return (
    <div className="layout">
      <Sidebar />
      <main className="main">

        {/* Demo bar */}
        <div className="demo-bar">
          <span>Demo:</span>
          {['normal','skeleton','fejl'].map(s => (
            <button key={s} className={`demo-btn${demo===s?' on':''}`} onClick={()=>setDemo(s)}>{s}</button>
          ))}
        </div>

        {/* Breadcrumb */}
        <div className="crumb">Sager</div>

        {/* Error */}
        {isError && (
          <div className="alert-bar">
            <strong>Kunne ikke hente sagsdata</strong> — prøv igen.
            <button className="btn" style={{marginLeft:12}}>Prøv igen</button>
          </div>
        )}

        {/* Header */}
        <div className="head">
          <div>
            <h1>Sager</h1>
            <div className="head-meta">
              <span className="hl-red">{critCount} kritiske</span>
              <span className="sep-dot">·</span>
              <span className="hl-amb">{escalCount} eskaleret</span>
              <span className="sep-dot">·</span>
              {openCount} åbne i alt
            </div>
          </div>
          <div className="head-btns">
            <button className="btn primary" onClick={() => doToast('Opret sag')}>+ Opret sag</button>
          </div>
        </div>

        {/* Filter row */}
        {!isSkeleton && (
          <div className="filter-row">
            <input className="fi-search" placeholder="Søg sager..." value={search}
              onChange={e => { setSearch(e.target.value); setPage(1); }} />
            <Dd label="Selskab"  opts={['Alle',...UNIQUE_SELSKABER]} value={selskabFil} onChange={v=>{setSelskabFil(v);setPage(1);}} />
            <Dd label="Type"     opts={['Alle',...UNIQUE_TYPES]}     value={typeFil}    onChange={v=>{setTypeFil(v);setPage(1);}}    divider="Sagstyper" />
            <Dd label="Prioritet" opts={UNIQUE_PRIO}                 value={prioFil}    onChange={v=>{setPrioFil(v);setPage(1);}} />
            <Dd label="Status"   opts={STATUS_OPTS}                  value={statusFil}  onChange={v=>{setStatusFil(v);setPage(1);}} />
            {hasFilter && (
              <button className="f-btn clr"
                onClick={() => { setSearch(''); setSelskabFil('Alle'); setTypeFil('Alle'); setPrioFil('Alle'); setStatusFil('Alle'); }}>
                Nulstil ×
              </button>
            )}
            <div className="filter-sep"></div>
            <div className="seg">
              {[['flat','Flat'],['grouped','Grupperet'],['kanban','Kanban']].map(([v,l]) => (
                <button key={v} className={`sopt${viewMode===v?' on':''}`} onClick={() => setViewMode(v)}>{l}</button>
              ))}
            </div>
            <div className="filter-spacer"></div>
            <button className="f-btn">Eksportér ▾</button>
          </div>
        )}

        {hasFilter && !isSkeleton && (
          <div style={{fontSize:11,color:'#6e7681'}}>
            {sorted.length} resultat{sorted.length!==1?'er':''} — filtreret fra {CASES.length} sager
          </div>
        )}

        {/* Content */}
        {isSkeleton ? (
          <SkeletonRows n={8} />
        ) : viewMode === 'flat' ? (
          <div className="tbl-wrap">
            {sorted.length === 0
              ? <div className="empty"><strong>Ingen sager matcher filteret</strong>Nulstil filteret for at se alle sager.</div>
              : (
                <table className="tbl">
                  <colgroup>
                    <col className="col-nr"/><col className="col-type"/><col className="col-selskab"/>
                    <col className="col-desc"/><col className="col-prio"/><col className="col-status"/>
                    <col className="col-frist"/><col className="col-ans"/><col className="col-act"/>
                  </colgroup>
                  <thead>
                    <tr>
                      <Th col="id"       label="Nr."       cls="col-nr" />
                      <Th col="type"     label="Type"      cls="col-type" />
                      <Th col="selskab"  label="Selskab"   cls="col-selskab" />
                      <Th col="desc"     label="Beskrivelse" cls="col-desc" />
                      <Th col="prio"     label="Prioritet" cls="col-prio" />
                      <Th col="status"   label="Status"    cls="col-status" />
                      <Th col="fristDays" label="Frist"   cls="col-frist" />
                      <Th col="ansvarlig" label="Ansvarlig" cls="col-ans" />
                      <th className="col-act"></th>
                    </tr>
                  </thead>
                  <tbody>
                    {paged.map(c => <CaseRow key={c.id} c={c} onToast={doToast} />)}
                  </tbody>
                </table>
              )}
          </div>
        ) : viewMode === 'grouped' ? (
          <GroupedView cases={sorted} onToast={doToast} />
        ) : (
          <KanbanView cases={filtered} onToast={doToast} />
        )}

        {/* Pagination */}
        {!isSkeleton && viewMode === 'flat' && sorted.length > 0 && (
          <div className="pager">
            <span className="pager-info">
              {Math.min((page-1)*pageSize+1,sorted.length)}–{Math.min(page*pageSize,sorted.length)} af {sorted.length}
            </span>
            <div style={{display:'flex',gap:4,alignItems:'center'}}>
              <button className="pg-btn" disabled={page===1} onClick={()=>setPage(p=>p-1)}>←</button>
              <span style={{fontSize:12,color:'#6e7681',padding:'0 4px'}}>{page} / {maxPage}</span>
              <button className="pg-btn" disabled={page===maxPage} onClick={()=>setPage(p=>p+1)}>→</button>
            </div>
            <div style={{display:'flex',gap:4,alignItems:'center'}}>
              <span style={{fontSize:11,color:'#6e7681'}}>Vis:</span>
              {[10,25,50].map(n => (
                <button key={n} className={`psz-btn${pageSize===n?' on':''}`}
                  onClick={()=>{setPageSize(n);setPage(1);}}>{n}</button>
              ))}
            </div>
          </div>
        )}

        {/* Bottom bar */}
        <div className="bot-bar">
          <span>
            {isSkeleton ? 'Henter…' : `${sorted.length} sager vist · ${CASES.filter(c=>c.status==='Løst'||c.status==='Lukket').length} afsluttet`}
          </span>
          <span>
            <span className="kbd">⌘K</span> handling ·{' '}
            <span className="kbd">N</span> ny sag ·{' '}
            <span className="kbd">F</span> filter
          </span>
        </div>

      </main>
      {toast && <div className="toast" key={toastKey}>✓ {toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SagerPage />);
</script>
</body>
</html>
